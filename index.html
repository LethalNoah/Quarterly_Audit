7. Belt loaders - Chock left rear wheel.
8. Light units (equipped with stabilizer jacks) - Engage the stabilizer jacks.
9. GPU - Chock left front wheel "Non-motorized GSE equipped with tricycle-type gear must have the left rear tire chocked".`},
{id:"FAOA-ROPS-004.00",w:2,text:`Do all of the employees operating vehicles on the ramp turn the engines off when the vehicles are unoccupied?

- Permitted exceptions: belt loaders, cargo loaders, light units, ground power units (GPU's), fuel trucks (no one in drivers seats), Aircraft Maintenance lift trucks (no one in the driver's seat) while actively attended by Maintenance personnel during activities that require the vehicle to be left running in order to operate the lift platform and air compressor, properly chocked diesel powered equipment during cold weather conditions below 40 degrees F, and other vehicles specifically covered in the Winter Ops Plan for the location in question.
- Motorized vehicles left running (except equipment with stabilizers in the down position, and belt loaders with the conveyor boom lowered) must be positioned facing away from the aircraft, gear shift in park/neutral, parking brake tested and found to be operable and set, and one wheel chocked forward and aft of the tire.`},
{id:"FAOA-ROPS-005.00",w:9,text:`Are qualified marshallers and wing walkers provided for all revenue feeder aircraft activity?

Marshallers and wing walkers are using appropriate safety equipment, adhering to aircraft parking plans, obstacle clearance requirements, and demonstrating clear and accurate signals.

Availability:
1. Marshalling personnel are provided for feeder aircraft start-up, parking area entry, and parking area exit.
2. Wing walkers are provided to assist aircraft marshalling when obstacle clearances cannot be achieved, at the request of crew members, or when required by the location's aircraft parking plan.

Aircraft obstacle clearance references:
-C208-10ft wing clearance
-C408-20ft wing clearance
-ATR-20ft wing clearance
-Others-20ft wingtip clearance

Safety Equipment:
1. Wands are being used by the Marshaller and Wing walker(s) when guiding aircraft.
2. Safety vests are being worn by the Marshaller and Wing walker(s).
3. Hearing protection is being used by the marshaller and wing walker(s).
**Note: Wands must be lit during times of low visibility and at night.`},
{id:"FAOA-ROPS-006.00",w:9,text:`Employees or equipment do not approach the aircraft until the propeller(s) or rotor(s) stop turning AND the beacon is turned off. From an observation, is it confirmed that no employee or equipment has approached the aircraft until the propeller(s) or rotor(s) stopped turning and the beacon is turned off?

- Ramp personnel remain clear of the prop area at all times.`},
{id:"FAOA-ROPS-007.01",w:9,text:`Are all safety markers/cones placed in appropriate locations around the aircraft and the anti-tip device "tail stand" has been installed prior to onload/offload operations?

NOTE: For departing aircraft Safety markers/cones must remain in position until all vehicle(s)/GSE have been removed from the silhouette (At least 15 feet away from any part of the aircraft). Safety markers / cones are removed from the aircraft and taken to their staging position when all vehicle(s) / GSE are removed from the silhouette prior to engine start, and before the aircraft beacon has been activated.

Safety Marker Placement single engine aircraft.
1. 3 feet from each wing tip, and tail.
2. 5 feet on either side of the main cargo door "when using a vehicle for on/off load".

Safety Marker Placement Multi-Engine Aircraft.
1. 3 feet from each wing tip, nose, tail.
2. Safety markers positioned 3 feet in front of and to the left and right of the left engine propeller.
3. 5 feet on either side of the cargo door(s) "when using a vehicle for on/off load".

Note: The aircraft operator will place one safety marker directly in front of the right engine for layover aircraft. Ramp personnel must remove this cone prior to interfacing equipment with the aircraft for loading.`},
{id:"FAOA-ROPS-008.00",w:9,text:`Do all Vehicles and GSE maintain proper distances from the aircraft?

1. All authorized vehicle(s) that are mated to or withdrawn from feeder aircraft maintain at least:
a. 3 ft clearance from all aircraft surfaces.
b. 5 ft clearance from cargo door when a vehicle is used for load or off-load.
2. Loader(s) maintains 4-6" horizontal clearance from the cargo doorsill and are positioned at the same vertical level of the doorsill as required by country/local regulations.
3. Tugs, dollies, and containers maintain at least a 5 ft clearance from aircraft wing tips.
4. GPU's are positioned a minimum of 5 feet from the nose of the aircraft in full view of the flight crew.
5. GSE is not parked or does not pass under any part of an aircraft.

Guidance: Ramp Operations Manual R4-5-5; R2-85-5`},
{id:"FAOA-ROPS-009.00",w:9,text:`When the Propeller-Brake is utilized for ATR type aircraft, are all ramp personnel adhering to appropriate procedures?

After notification from the flight crew that the prop-brake will be used.
1. The marshaller verifies the right main landing gear chocks and right engine cone have been removed.
2. The marshaller clears all personnel a minimum of 50 feet from the aircraft and signals the crew for engine start.
3. All personnel remain clear of the right engine area.

Note: Ramp personnel will NOT chock the right main landing gear or place a safety marker on the right engine of multi-engine aircraft at any time.

Guidance: Ramp Operations Manual: R4-5-5-0`},
{id:"FAOA-ROPS-010.01",w:9,text:`Are all vehicle(s), loader(s), and transition deck(s) mated to and withdrawn from the aircraft following appropriate procedures?

Note: Load/Off-Load operations must not begin until all equipment is matted and secured appropriately.
1. Cargo doors are opened and secured prior to mating equipment.
2. Guide person and e-stop operator "when required" are positioned in the designated locations and are directing the equipment movement using clear and appropriate hand signals.
3. Brake checks are performed a minimum of 12 feet from the aircraft.
4. Loader(s) bridge/belt is raised to approximate doorsill height at the 12 foot brake check for final mating.
5. Loader(s) bridge/belt is lowered to the full down position prior to being withdrawn from the aircraft.
6. All vehicles and equipment are properly secured/chocked while mated to the aircraft.
a. Vehicles set parking brake, chock front and back of driver side rear tire.
b. Belt Loader set parking brake chock front and back of driver side rear tire.
c. Cargo Loaders set parking brake and deploy stabilizers.
d. Transition Deck set tongue brake and deploy stabilizers.
e. Proper chock removal procedures are followed.`},
{id:"FAOA-ROPS-011.00",w:5,text:`Are all aircraft entry ladders, rollers, and doorsill guards used appropriately?
1. Aircraft entry ladders are removed when loaders are being mated to or withdrawn from the aircraft.
2. Aircraft doorsill guards "when equipped" are installed prior to loader interface, and stowed upon load completion.
3. Aircraft rollers are placed in the stowed (up) position prior to loader interface and during loader withdrawal.`},
{id:"FAOA-ROPS-012.00",w:7,text:`Are all loaders and transition decks properly operated during off/onload operations?

Note:
1. Belt Loader movable handrail (if equipped) is raised when persons are walking on the belt and lowered during cargo loading and offloading unless prevented by equipment configuration or prohibited by local/country regulations.
2. Belt Loader tethered emergency stop switch (if equipped) is positioned inside the cargo compartment during cargo loading and offloading.
3. Personnel are not standing on the loader(s) bridge/belt, or the transition deck while the equipment is in motion. Employees are not standing on loader bridge/belt when being raised or lowered.
4. Transition decks and backup loaders are not backed to the aircraft. They are pushed into place using a tug with a front hitch.
5. Transition deck rails are configured appropriately for the load/off-load configuration to be used:
a. Transition deck configuration parallel to fuselage: Guide person raises the end stops and lowers the three side rails on the deck closest to the loader.
b. Transition deck configuration parallel to the wing: Guide person lowers the end stops and raises all side rails.`},
{id:"FAOA-ROPS-013.02",w:7,text:`Are all layover and transit aircraft properly loaded, offloaded, and secured?

1. The crew member must supervise the loading of the aircraft. In no case are any aircraft to be preloaded without a crewmember present.
2. Feeder aircraft are not used for cargo storage. Cargo must not be loaded by the A.M. shift for a P.M. departure.
3. Aircraft doors, pods, lockers, and hatches are secured prior to departure, during inclement weather, and for layover.
4. Layover and transit aircraft are properly chocked using appropriate chock sizes:
A. Multi-Engine Arrival and Departure: Chock left main and nose gear with the same chocks used on trunk aircraft, or chocks specified in ROM 8-25.
B. Multi-Engine Layover: Aircraft operator personnel will chock the right main tire.
- Note: After multi-engine aircraft layover the right main landing gear chock must be removed prior to interfacing equipment with the aircraft.
C. Single Engine: Chock Mains only using rubber chocks that are a minimum of 4 inches in length, 10 inches in width, and 4 inches in height.

Guidance: Ramp Operations Manual R4-5-5, R8-25, R7-15-20`},
{id:"FAOA-ROPS-014.00",w:5,text:`Are all Containerized/palletized feeder aircraft ULD(s) loaded and offloaded following appropriate procedures?

1. Aircraft floor locks are configured correctly for the ULD type to be used prior to load start.
2. Two handlers are moving ULD(s) from the transition deck onto the loader bridge.
a. For non-powered bridge loaders, a ULD stop is being placed in the appropriate slot near the aft end of the bridge when ULD(s) are on the loader bridge deck to prevent ULD rollback.
3. Employees are accessing the loader bridge via the platform.
4. Doorsill latches are raised when ULD(s) have transitioned from loader to aircraft and prior to being pushed into position on the aircraft.
5. ULD(s) are secured into their assigned position by the appropriate floor locks (cargo restraints), located at its forward and aft end.`}
]},
{id:"fao-train",code:"TRAIN",title:"Training",items:[
{id:"FAOA-TRAIN-001.00",w:9,text:`Are all personnel who load or offload feeder aircraft, and their managers, current on CAF-137? All personnel who load or offload feeder aircraft and their managers must complete the instructor or administrator-led Feeder Handling course (CAF137) and recurrent EXPRESSFLC test (CAF137P) within the previous 36 months.`},
{id:"FAOA-TRAIN-002.00",w:9,text:`Feeder Agents, and employees who complete feeder aircraft paperwork and their managers must also complete the instructor or administrator-led Feeder Ramp Operations course (CAF157) and recurrent EXPRESSFLC test (CAF157P) within the previous 36 months. As outlined, are all employees and their managers current on the required training?

Note: Upon completing recurrent EXPRESSFLC test (CAF157P), employees also receive equivalent credit for the Feeder Handling recurrent (CAF137P) eliminating the need to complete two recurrent tests.`},
{id:"FAOA-TRAIN-003.00",w:9,text:`Personnel who load or offload ATR72-600F and C-408 type feeder aircraft have completed aircraft specific training within the previous 36 months.

Personnel who complete feeder paperwork on containerized ATR72-600F or containerized C-408 type aircraft have completed the aircraft specific training within the previous 36 months.

Are all required personnel current on the proper training as noted above?

1. ATR72-600F containerized configuration.

2. C-408 containerized configuration.
- Note: Employees who complete training under C408AC/C408ACP receive credit for C408BL/C408BLP and are qualified to load/off-load C-408 aircraft in the bulk configuration.
- C408AC/C408ACP
3. C-408 Bulk Load configuration.
- **Note: Employees that receive training for C408BL/C408BLP DO NOT receive equivalent credit for C408AC/C408ACP and are not qualified to load/off-load C-408 aircraft in the containerized configuration.
- C408BL/C408BLP`},
{id:"FAOA-TRAIN-004.00",w:4,text:`All employees qualified in Feeder Handling (CAF137) and (CAF157) that received initial or recurrent training prior to 12/1/2023 have reviewed and completed the acknowledgment for Multi-Engine Feeder Aircraft Chocking, Safety Marker, and Prop-Brake Job Aid.

{id:"FAOA-TRAIN-005.00",w:4,text:`Locations that utilize vendors to perform ground handling functions are in compliance with Vendor Endorsement Procedures found in 2-20-5 of the ramp operations manual. If your location utilizes a vendor or vendors to perform ground handling functions, are you compliant as noted in the previous statement?`},
{id:"FAOA-TRAIN-006.00",w:4,text:`Employees and managers of employees who accept, inspect, handle, load, and process dangerous goods according to regulations set by the International Civil Aviation Organization (ICAO), International Air Transport Association (IATA), local regulations, and policies/procedures set by FedEx Express have completed DG specialist training. Are all employees and their managers noted above current with the required training?

Workbench DG:

- Initial FLC training (for existing DG specialists when AutoDG was Replaced with Workbench DG): CWBDGT1 / Recurrency: CWBDGT3

Note: Employees who perform other DG related duties must satisfy the training requirements established in the Dangerous Goods Manual.`},

{id:"FAOA-TRAIN-009.00",w:1,text:`Have all ramp managers, ramp senior managers, or ramp agents at the locations identified below completed Aircraft Mishap Response CBT course CMSHPRX within the previous 12 months?

{id:"fao-ws",code:"WS",title:"Weighing Scales",items:[
{id:"FAOA-WS-001.00",w:7,text:`Are only company approved weighing scales used to weigh all cargo loaded on board FedEx owned or Leased aircraft, and each location has established a backup scale procedure approved by FAO?`},
{id:"FAOA-WS-002.00",w:7,text:`Are primary and backup(s) scales tested and validated or calibrated once each six months using appropriately completed and current scale calibration record(s)?

Example: If a scale is calibrated on January 14th, its next required calibration MUST be conducted prior to the end of the sixth month, or in this case, the end of July.

- Note: If local or country regulations outside the U.S. prohibit this from occurring, scales are calibrated in accordance with local or country regulations.

Note:
- For vendor calibrated portable feeder scales it is acceptable to retain the vendor calibration record in-lieu of the biannual feeder scale calibration record (M-8183).
- For FedEx calibrated portable feeder scales the location must complete and retain the biannual feeder scale calibration record (M-8183).`},
{id:"FAOA-WS-003.00",w:2,text:`Current scale calibration record(s) must be kept on file at the station by the ramp manager, station manager, or a qualified designee for primary and backup(s) scales.

- The previously completed scale calibration record(s) must be maintained for a minimum of 30 days after the current calibration record(s) is filed. After 30 days, this record may be removed from the file.
- Is the location's retention current based on the above requirements?`},
{id:"FAOA-WS-004.00",w:4,text:`Is a current FedEx calibration sticker or equivalent vendor's sticker affixed to the readout display of each FedEx Express or vendor owned scale?

- Scales with dual readout displays have 2 calibration stickers.
- Stickers may be attached adjacent to FedEx readout displays if there is insufficient area on the displays.

Note: All old (past calibration) dates/stickers must be removed. Only current calibration dates/stickers are to be affixed to the scale readout display.`},
{id:"FAOA-WS-005.00",w:7,text:`Are all primary and backup scales used to weigh cargo intended for aircraft transport checked once in a 24-hour period using appropriately completed and current daily scale inspection forms before any cargo is weighed?

1. The EPN documented in the Equipment Piece Number field on the Daily Scale Inspection Form, Data Plate Read Out or Scale column, and calibration records must all match. If both the EPN and serial number are used in the records, a physical inspection must reveal that both numbers match that specific scale.
- **Note: Portable feeder scales utilize the scale serial number found on the side of the data plate as the equipment piece number.
2. Verification of each scale's accuracy (within 1%) is properly checked using an adequate minimum weight and documented on the Daily Scale Inspection form (FedEx-M-1268)
3. Pancake scales-use dolly disconnected from tug.
4. Slide deck, WASP, and push-Off LD3/Demi scales-use empty container (with doors)
5. Portable/Feeder scales-use 50 lbs. known weight.`},
{id:"FAOA-WS-006.00",w:4,text:`Are all company approved weight and balance scales functioning properly or an 8-1/2" x 11" white piece of paper marked "SCALE INOP DO NOT USE" is attached with tape to cover the scale readout display of each malfunctioning scale?`}
]},

{id:"dat-dgs",code:"DG STAFFING",title:"Dangerous Goods Staffing",items:[
{id:"DG-STAFFING-ACK",w:1,wq:true,text:`DG staffing requirements Acknowledgement. I acknowledge the following DG staffing requirements:

A. Ensure that currently trained Dangerous Goods Specialists/Agents are on duty (working at the facility during that time) for any aircraft activity (Feeder or Trunk). If a member of management covers for the Dangerous Goods Specialist, then management must put a note in the schedule file (stapled to the schedule) that the manager covered the Dangerous Goods Specialist position.

Note: US Ops Station and US Ramp locations (excluding Hub Ops) are NOT required to have a dangerous goods specialist from sort start until sort end. Management should staff DG package inspection based on the DG staffing guideline in table 1-2-1.

B. Ensure that currently trained Spill Cleanup Specialists are on duty (working at the facility during that time) for any aircraft or vehicle activity involving sort or reload operations and within 30 minutes of recall to return at other times of location operation. Recall for back up purposes means employee is reachable and en route (within 30 minutes) to the station or vehicle (if incident occurs on road).`},
{id:"CORP-DG-030.05a",w:1,wq:true,text:`Does your location meet all of the staffing guidelines outlined below for the AM shift? If yes, please enter the employee number(s) by day in the boxes below. Validate by testing ALL of the following:

- Review the employee time card or time entry screen for the prior week for Monday - Sunday AM operations to see if appropriate staffing occurred (e.g. verify that the employee is in an active in-facility work code for AM sort and is noted on the employee time card for the Dangerous Goods Spill Cleanup Specialist or Spill Cleanup Only Specialist)
- Review Published Schedule
- Perform a visual observation of the AM sort operation for adequate staffing

The CSM requires an employee number entry for each day, AM Sunday through Saturday (enter NA where there is no AM operation that day). Record those in the CSM itself, not here.`},
{id:"CORP-DG-030.05b",w:1,wq:true,text:`Does your location meet all of the staffing guidelines outlined below for the PM shift? If yes, please enter the employee number(s) by day in the boxes below. Validate by testing ALL of the following:

- Review Published Schedule
- Perform a visual observation of the PM sort operation for adequate staffing

The CSM requires an employee number entry for each day, PM Sunday through Saturday (enter NA where there is no PM operation that day). Record those in the CSM itself, not here.`},

]},
{id:"dat-env",code:"ENV",title:"Environmental",items:[
{id:"CORP-ENV-001.04",w:1,wq:true,text:`Administrative: Has a location environmental coordinator (LEC) been designated for the facility in the Global Environmental Management Information System (GEMIS) and is this person the active LEC?

- Note: LEC(s) should be appointed within 30 days of location start up or LEC moves out of position.`},
{id:"CORP-ENV-003.04",w:1,wq:true,text:`Are the environmental files maintained in a central, secure location labeled with the Global Environmental Management environmental sticker, and are all environmental records maintained in the location's environmental files for a period of three (3) years plus the current year unless otherwise directed by EMD?

- Note: Secure area is an area where the files can be monitored or locked to prevent tampering.
- Note: Securely recycle or destroy original records older than these.
- Note: Files relating to the following must be maintained on-site permanently, or until directed by EMD to recycle or destroy:
- Emergency Generator Logs (fuel use and hours of operation).
- Permits & Registrations (Air, POTW, Storm water, Tanks).
- Plans (Contingency, Spill Prevention Control & Countermeasures (SPCC), Storm Water Pollution Prevention Plan (SWPPP)).`},
{id:"CORP-ENV-004.04",w:1,wq:true,text:`Waste Management: Has the facility maintained waste manifests and matched returned manifest copy in the location environmental files for three (3) years plus the current year?

*Note: Designed Facility to Generator documents should be received and matched within 45 days from the date of pick up.
- Note: Designed Facility to Generator should be received and matched within 45 days from the date of pick up. Referencing CORP-ENV-004b.01
- This does not apply to waste shipped on a Bill of Lading.`},
{id:"CORP-ENV-004b.02",w:1,wq:true,text:`Have the "Generator's Initial Copy" and the "Designated Facility to Generator" of all uniform hazardous waste manifests been matched and maintained in the environmental file since the last CSM audit?

- Note: Designed Facility to Generator should be received and matched within 45 days from the date of pick up.
- This does not apply to waste shipped on a Bill of Lading.`},
{id:"CORP-ENV-004A.01",w:1,wq:true,text:`For all special, nonhazardous and hazardous waste areas, has the "Weekly Waste Accumulation Area Inspection" log or the "Combined Weekly Waste Accumulation & AST Inspection" log been completed for the previous 12 months?

Note: Daily inspections are required for hazardous waste generators in CA.
Note: Examples of areas where waste commonly accumulates are facility, vehicle, GSE, and aircraft maintenance areas. More than one area can be inspected on a single log but areas must be identified on the log.`},
{id:"CORP-ENV-006.03",w:1,wq:true,text:`FOR PACKAGE RELATED WASTES

Has the location had any dangerous goods or non-dangerous goods waste package occurrence(s) that required vendor waste disposal over the past 12 months? If yes, Q6B - 6C
(Conditional Question)`},
{id:"CORP-ENV-006B.02",w:1,wq:true,text:`Were all dangerous goods waste containers shipped from the facility in 90 days or less from the accumulation start dates as required?`},
{id:"CORP-ENV-006C.01",w:1,wq:true,text:`Has a Weekly Waste Accumulation Inspection Log or the Combined Weekly Waste Inspection and AST Inspection Log been completed every week since the accumulation start date until its disposal?`},
{id:"CORP-ENV-009.04",w:1,wq:true,text:`Have the key requirements been followed to ensure proper recycling of batteries?

All procedures must be followed in order to answer "Yes". The accumulation start date written on the collection container is no more than 365 days from today's date. The accumulation start date is the date the first battery is placed into the container. The collection container lid is kept closed except when adding batteries. All battery contact points are covered with tape prior to placing batteries in the battery collection container.

The battery shipping log is placed on or near the battery bucket and properly completed. An approved waste vendor is used for recycled batteries. (A list of waste vendors can be found on the EMD website, keyword: EMD). Quarterly waste inspection is completed for all battery accumulating areas.

- Has Universal Waste signage been posted?`},
{id:"CORP-ENV-011.04",w:1,wq:true,text:`Have the key requirements been followed to ensure proper recycling of compact fluorescent bulbs? All procedures must be followed in order to answer "Yes"

- Note: These requirements also apply to janitorial staff responsible for managing compact fluorescent bulbs on site
- Is the box is stored in a manner that would prevent bulb breakage and the collection container lid kept closed except when adding bulbs?
- The accumulation start date is written on the collection container label. The accumulation start date is the date the first bulb was placed into the container and must be less than 365 days from today's date.
- Is the storage area labeled "Universal Waste?"
- Approved waste vendor is used for recycled bulbs. (A list of waste vendors can be found on the EMD website)
- Quarterly waste inspection is completed for all waste bulb accumulation areas
- Has Universal Waste signage been posted?
- Note: If an outside vendor at your location provides contracted service to replace bulbs and handle the compact fluorescent bulb waste, these requirements also apply.`},
{id:"CORP-ENV-012.02",w:1,wq:true,text:`Water Quality Management: Does the facility have a Storm water Pollution Prevention Plan (SWPPP)? A SWPPP is generally required if the facility is conducting outdoor industrial activities. (Conditional question)`},
{id:"CORP-ENV-012B.02",w:1,wq:true,text:`Has the Pollution Prevention Team (PPT) review of SWPPP been completed in previous 12 months & documentation retained in SWPPP?

- Environmental P & P Chapter 4 Table 4-3.3`},
{id:"CORP-ENV-012C.03",w:1,wq:true,text:`Have respective storm water inspections been conducted in accordance with the schedule as outlined in the location's SWPPP (inspections MAY include but are not limited to: annual site inspection(s), monthly visual inspections, quarterly inspections, quarterly wet/dry, and quarterly visual observations)?`},
{id:"CORP-ENV-013.03",w:1,wq:true,text:`Have storm water inspections been completed semi-annually in accordance with the Environmental P&P in the previous 12 months?

- (Environmental P&P Section 4-3.4)`},
{id:"CORP-ENV-014.02",w:1,wq:true,text:`Is vehicle and/or equipment washing conducted on-site? (Conditional Question)`},
{id:"CORP-ENV-014A.04",w:1,wq:true,text:`To ensure proper washing procedures, have equipment washing activities (aircraft, GSE, vans, trucks, and trailers) been observed and findings documented each quarter in the previous 12 months?

- See Environmental P&P Section 4-5.0
- Note:
- If vehicle and or equipment washing is performed outside then the water must be collected and discharged to a floor drain or removed off-site (A very limited number of sites have been issued permits to discharge onsite. Check the site's Facility Environmental Profile.).
- Test the previous twelve months`},
{id:"CORP-ENV-014C.03",w:1,wq:true,text:`Upload documentation for Quarterly Wash Observation based on your response from CORP-ENV-014A.04

- If you do not conduct on-site vehicle wash or equipment wash on-site - attach a file indicating that you are not required to conduct a Quarterly Wash Observation.`},
{id:"CORP-ENV-015A.03",w:1,wq:true,text:`Tank Management - Above Ground Storage Tanks (AST): Has an AST inspection been completed for all ASTs?

** The FedEx Environmental Policy and Procedures Manual requires that every container with a capacity LARGER than 55 gal containing new or used fuel and every AST to be inspected monthly. A monthly AST Inspection form is provided on the EMD website or in the site's SPCC plan.
Note: An AST is defined as any stationary vessel or container that has a capacity equal to or greater than 55 gallons and a Container as a portable or moveable aboveground vessel with a capacity equal to or greater than 55 gallons. See Section 5-1.0. The Combined Weekly Waste Accumulation and AST Inspection Log will also satisfy the inspection requirement.`},
{id:"CORP-ENV-015B.01",w:1,wq:true,text:`For SPCC locations, have AST inspections been completed using the form provided in the SPCC plan for ASTs containing petroleum product in the frequency dictated by the plan (minimum monthly)?

Note: SPCC plans are required for facilities for total storing capacity is equal to or greater than 1,320 gallons of petroleum product.`},
{id:"CORP-ENV-016.00",w:1,wq:true,text:`Tank Management - Underground Storage Tank (UST): Does the location have an underground storage tank? (Conditional Question)`},
{id:"CORP-ENV-016A.05",w:1,wq:true,text:`For existing USTs is a copy of the state issued proof of UST registration certificate posted near the tank? The following jurisdictions issue some form of registration that must be posted: DC, IN, MD, NJ, PA, TN, TX.`},
{id:"CORP-ENV-016B.02",w:1,wq:true,text:`Have copies of the FedEx Underground Fuel Tank Compliance Requirements Summary, Monthly Site Compliance Reports (last 12 months) and Monthly Fuel Summary Record (if required) been downloaded from GEMIS and placed in the environmental files?

NOTE: The FedEx Underground Fuel Tank Compliance Requirements Summary will identify whether or not the Monthly Fuel Summary Record is required for the respective site.`},
{id:"CORP-ENV-016C.02",w:1,wq:true,text:`Have Monthly UST Walkthrough Inspections been completed and documented on the required form for the previous twelve months?

(The following sites do not have this requirement because inspections are conducted by a vendor: OAKR, LAXR and JEMA)`},
{id:"CORP-ENV-016C.03",w:1,wq:true,text:`For sites which inspections are conducted by a vendor, do you have immediate access to the last 12 months of vendor performed inspections?

(The following sites do not have this requirement because inspections are conducted by a vendor: OAKR and LAXR)`},
{id:"CORP-ENV-018.00",w:1,wq:true,text:`Community Right to Know: Have copies of the Tier II reports been maintained in the environmental file since the previous CSM audit?

** For California locations; does the location have a "California Hazardous Material Business Plan/Chemical Inventory" report on file in lieu of the Tier II report?`},
{id:"CORP-ENV-019.02",w:1,wq:true,text:`Spill Prevention and Response: Do you have a spill clean-up kit or materials for non-package spills that occur at the location?

Ref: Environmental Policy 8-2.0`},
{id:"CORP-ENV-020.02",w:1,wq:true,text:`Has an internal emergency phone list been posted in potential spill or key areas and is the EMD Spill Hotline listed on the internal emergency phone list? 877-FXSPILL or 877-397-7455 (Post an emergency contact list near, on, or inside every spill kit.)

The phone list should also include the following contacts:
- Emergency coordinator/senior manager (day and night phone/mobile number)
- Alternate emergency coordinator (day and night phone/mobile number)`},
{id:"CORP-ENV-022.02",w:1,wq:true,text:`Was an EMD spill report completed for any non-package spill greater than 10 gallons or 1/2 pound which reached the environment, or required the services of an emergency response vendor, since the previous CSM audit?

[If the location did not incur a non-package spill of 10 gallons or more, answer NA.]`}
]},
{id:"dat-fin",code:"FIN",title:"Financial Controls",items:[
{id:"CONTRACTS-ATTACHMENT",w:1,wq:true,text:`Contracts Attachment: Click on the link below to go to the CSM document site to download the required workbook. Download the Contracts Testing Workbook from the above link.

Upon completion you are required to upload it as supporting documentation of your testing. If you fail to upload the completed supporting documentation, you will NOT be able to submit your CSM.

Once you have completed the Contracts workbook, click on the add button. Next, select the browse button and attach the completed worksheet.`},

{id:"CONTRACTS-VALIDATION-Q2.0",w:1,wq:true,text:`Contracts Validation Question 2.0: Based upon testing noted in the completed Contracts workbook attached above, was your location above the 90% acceptable threshold for Contract testing?`}
]},
{id:"dat-time",code:"TIME",title:"Timekeeping / Dimensions",items:[
{id:"CORP-Time-001.04",w:1,wq:true,text:`Are the schedules completed in an approved system (Dimensions, OpsScheduler, or Valet) by Wednesday end of business prior to the applicable schedule week?`},
{id:"CORP-Time-005.02",w:1,wq:true,text:`Are employee timecards reviewed daily and Must Fix exceptions addressed weekly prior to pay period closing?`},
{id:"CORP-Time-006.01",w:1,wq:true,text:`Has the end of week time card validation been completed? Review the previous four weeks.`},
{id:"CORP-Time-011.00",w:1,wq:true,text:`Knowing that Task Cards must not have Pay-Related tasks written on the Task Cards, does management have a process to verify there are no Pay-Related Codes on the Task Cards?`},
{id:"CORP-Time-012.00",w:1,wq:true,text:`If a Task Card has Pay-Related Codes, is the Task Card treated as a Time Keeping Card and maintained as a Time Keeping Card based on the current policy?`},
{id:"CORP-Time-013.00",w:1,wq:true,text:`Are timecards retained in a secured area for the required retention?

Note: Refer to Employment Law Reference Guide. If additional retention is required from Legal as related to litigation, is the location in compliance with these requirements?`}
]},
{id:"dat-ohe",code:"OHE",title:"OFCCP / HR / EEO",items:[
{id:"CORP-OHE-001.05a",w:1,wq:true,text:`Are the current All In One posters displayed in a conspicuous location where they are easily visible to employees?
- Federal Poster
- State Poster
- City/County/Airport Poster(s) (where applicable)
- FedEx Express Notices Poster
- Additional State and/or Local Notices not part of AIO poster (where applicable)
- Additional Safety Postings (where applicable)

Keyword "FIF"`},
{id:"CORP-OHE-016.00",w:1,wq:true,text:`Are employees aware of who their matrix HR Representative is and how to contact him/her? (This information should be posted somewhere on-location).`},
{id:"CORP-OHE-017.00",w:1,wq:true,text:`Do you have a process in place to ensure all employees are assigned duties within their job classification?`},
{id:"CORP-OHE-021.00",w:1,wq:true,text:`Is the location's HCMP contact information, including name, address, phone number, and email, posted in common areas? E.G. Bulletin Boards, Break Rooms, and/or other areas that our employees can easily access?`}
]},
{id:"dat-opst",code:"OPST",title:"Overlooks & PSTs",items:[
{id:"AGFS-OPST-003.02",w:2,text:`Is a 30 calendar day file of AM and PM PST checks retained at the location/organization and include the following?
- All warehouse PST checklists
- All ramp staging area checklists
- All ramp control sheets`},
{id:"AGFS-OPST-004.02",w:1,wq:true,text:`Are three specific employees designated to complete the PST checks and are the checks designed for timely sequential execution?`},
{id:"AGFS-OPST-005.01",w:1,wq:true,text:`Is a standard form used for the PST checks, and are the items to be checked detailed on the form?`},
{id:"AGFS-OPST-006.03",w:1,wq:true,text:`Does management review each PST and ensure all required fields are finalized to include signatures, employee numbers, and PST completion Time & Date on a daily basis?`},
{id:"AGFS-OPST-008.02",w:1,wq:true,text:`Do employees who are designated to perform the checks have a training acknowledgement and understand the importance of the P-S-T check?`}
]},
{id:"dat-pah",code:"PAH",title:"Package Handling",items:[
{id:"CORP-PAH-001.00",w:1,text:`Is an "Open Package Log Book" available? (Evidence of use both current and recent past.)`},
{id:"CORP-PAH-003.03",w:1,wq:true,text:`Packages are NOT thrown or dropped, and packages are placed properly on surface to minimize crushing and prevent packages from falling?`},
{id:"CORP-PAH-004.01",w:1,wq:true,text:`Are appropriate rewrap materials and supplies, as allowed, available to correct package problems as they occur? And is the rewrap area as close as possible to the sort belt designated with appropriate signs, labels, etc? For a list of rewrap supplies: Refer to the BP Manual`},
{id:"CORP-PAH-006.02",w:1,wq:true,text:`Observation - Are damaged packages addressed/inspected immediately to minimize further damage and is a STAT 37 applied? Leaking packages &/or packages with an odor are immediately brought to the attention of the DG Specialist.`},
{id:"CORP-PAH-007.01",w:1,wq:true,text:`PM Observation - Do Luggage and non-conveyable shipments have tie-on tags attached? Items such as canvas bags, soft garment bags, sporting equipment, plastic coolers, and wooden cases require tie-on tags.`},
{id:"AGFS-PAH-007.00",w:1,wq:true,text:`Observation - Do Luggage and non-conveyable shipments have tie-on tags attached? Items such as canvas bags, soft garment bags, sporting equipment, plastic coolers, and wooden cases require tie-on tags.`},
{id:"CORP-PAH-009.00",w:1,text:`Has your location implemented the Red Bags for FedEx First Overnight & FedEx International First Packages?
- Reference Tools - FFO_IN1_Handling_Procedures`},
{id:"CORP-PAH-010.00",w:1,wq:true,text:`Has your location followed the load compliance guidelines as noted below?

US Ops -
- FO/IN1 Boxes & Red Bags are CONS scanned
- Loaded into rear of shuttle or bulk truck, pure FO ULD, or segregated in ADG ULD
- TDR marked accordingly

AGFS -
- Segregate FO/IN1 in Aft Bulk Compartment and load as close to door as possible
- Load in pure FO/IN1 ULD
- Segregated in ADG ULD
- FDR marked accordingly`},
{id:"CORP-PAH-020.02",w:1,wq:true,text:`Packaging Handling PM Reload Observation: During the Reload, conduct observation of packages sent down the belt to load outbound for a MINIMUM of 20 minutes. Stand close to the ULD loading area and select packages to perform a six-sided check to verify that

- All old labels have been removed or completely obscured
- All old markings have been removed or completely obscured
- Current markings and labels are durably affixed to the package
- Markings are indelible;
- Labels are securely applied and meet any additional attachment requirements in policy;
- Documentation and labeling placed in an airbill pouch (when allowed by policy) has been secured there so that it will not fall out;
- Packaging is in good condition (not torn, wet, excessively dented, leaking, emitting unacceptable odor levels, or otherwise compromised such that the packages cannot be expected to transit the FedEx system intact)
- Packaging is of an acceptable type, e.g.: no chipboard boxes, no unacceptable tapes (such as cellophane tape, duct tape, masking tape), and no string or rope, etc.
- Note: Packaging types are all spelled out in the FedEx Express Customer packaging guidelines and the FedEx How To Pack customer job aid.

Document the packages you observed by scanning them to a Paperwork Pouch CONS (CONS Form ID 0505).`},
{id:"CORP-PAH-020.00a",w:1,wq:true,text:`Using the "Destination/Service Report" in the CONS Report system:
- Enter the CONS number to generate a listing of the tracking numbers for observed packages,
- Save the list as an Excel file, and
- Attach the Excel file here`}
]},
{id:"dat-misd",code:"MISD",title:"Mis-Declared Ground Limited Quantity",items:[
{id:"CORP-MISD-001.01",w:1,wq:true,text:`Was the sort/reload completed with zero packages bearing the Ground Limited Quantity mark present?

- Conduct a belt check during the PM reload, look for Ground Limited Quantity marking.
- If any package with a Ground limited Quantity mark is found, transport the package to the DG area.
- Note the tracking number and follow-up with accepting location, employee, and manager.`},
{id:"CORP-MISD-002.00",w:1,wq:true,text:`Were handlers actively looking for indications of undeclared/mis-declared DG before loading the packages into the ULD or Shuttle? (Turning the packages around while loading with the goal of looking for indications of DG)

- If any packages are scanned and loaded with the Ground Limited Quantity marking, note the tracking number, loading and accepting employee.
- Remove the package from the ULD and take immediately to the DG area.`},
{id:"CORP-MISD-003.00",w:1,wq:true,text:`Is there evidence of communication concerning Ground Limited Quantity acceptance throughout the location?

- Posters or other visible communications regarding proper handling of shipments bearing the Ground Limited Quantity marking. These should be in various locations in the station and not only in the DG area.`},
{id:"CORP-MISD-004.00",w:1,wq:true,text:`Does each employee understand what steps they should take if they see the Ground Limited Quantity marking? Ask 5 employees if they can identify the Ground Limited Quantity marking on a package, what should they do if one is discovered?

Document employee #'s for those asked in the sub-question "b"

- You should ask a variety of employees - Courier, CSA, Handler
- The answer should vary between them for example:
Courier - refuse at point of pickup (if at a drop box, bring immediately to the DG area upon return to building)
CSA - refuse
Handler - take immediately to the DG area and do not load into a ULD/Shuttle.`},
{id:"CORP-MISD-004b.00",w:1,wq:true,text:`Enter the employee number from question four using a "," comma to separate numbers.`}
]},
{id:"dat-saf",code:"SAF",title:"Safety",items:[
{id:"CORP-SAF-001.02",w:1,wq:true,text:`Are employees operating vehicle and/or GSE per applicable policies and procedures?

- (e.g. sound horn prior to backing, STOP and sound horn prior to entering/exiting the building, utilizing seat belts.)?`},
{id:"CORP-SAF-005.04",w:1,wq:true,text:`Are the First Aid Kit(s) stocked per Safety Manual 2-4 (First aid Supplies Policy)?`},
{id:"CORP-SAF-007.00",w:1,wq:true,text:`Do employees use all required personal protective equipment (PPE) as required by policy?`},
{id:"CORP-SAF-013.03",w:1,wq:true,text:`Is the Safety Bulletin Board present and maintained per policy?`},
{id:"CORP-SAF-014.01",w:1,wq:true,text:`Is the Written Evacuation Plan and Emergency Action Plan on file and posted per policy?`},
{id:"CORP-SAF-015.01",w:1,wq:true,text:`Do employees refrain from using unauthorized electronic devices while operating FedEx Express vehicles per Safety Manual Policy 4-5 (Electronic Device Distractions Policy).`},
{id:"CORP-SAF-021.00",w:1,wq:true,text:`Is your location compliant on inspecting your work areas and operation for damaged extension cords?`}
]},
{id:"dat-aed",code:"AED",title:"Automated External Defibrillator",items:[
{id:"CORP-AED-001.02",w:1,wq:true,text:`Is the current AED coordinator designated in LifeREADY360?

Note:
- Employee is required to be active and domiciled at the location.
- The AED coordinator must be appointed during program start up or when an AED coordinator moves out of the position.
- Coordinator designated is listed via Keyword: AED > Select "Documents" across the top of the page > AED Compliance report`},
{id:"CORP-AED-002.02",w:1,wq:true,text:`Have the location's inspection results been updated in LifeReady360 for the previous 3 months?

- Pulling Inspection Detail Report in LifeReady360 Job Aids`},
{id:"CORP-AED-004.01",w:1,wq:true,text:`Are the location AED(s) pads and batteries compliant?

Review AED Dashboard at Keyword: AED or the LifeReady360 dashboard.`},
{id:"CORP-AED-004a.01",w:1,wq:true,text:`Has the location ordered pads and battery replacements? Provide proof of order through Cintas receipt or FCF order screenshot.

- AED Pad Ordering, Replacement, and Servicing job aid`},
{id:"CORP-AED-005.00",w:1,wq:true,text:`Does the location have accurate placement descriptions for all AEDs entered into LifeREADY360?`}
]},
{id:"dat-erm",code:"ERM",title:"Ergonomic Risk Mitigation",items:[
{id:"CORP-ERM-002.01",w:1,wq:true,text:`Is the Ergonomic Risk Mitigation Assessment, SF-730, on file for the quarter listed?

- Determine if the SF-730 is filed for the quarter listed. Testing only for the presence of the form; proper completion is reviewed in the following questions.
Note: If more than one assessment is being completed during the quarter, select one to test and list which one was tested in the comment box. However, for CSM testing purposes, you cannot review the assessment of the same work shift quarter after quarter - you will have to select different areas or shifts each testing period, as applicable.
The SF-730 is not required to be completed at locations with fewer than 10 employees unless located in the state of California or New York.`},
{id:"CORP-ERM-003.01",w:1,wq:true,text:`Is the header completed properly, and the correct revision utilized?

Determine if the correct revision was used (see Forms page); and that the header was properly completed. To be compliant the following must be properly completed:
- Station Information Section: At least two of the three fields must be completed correctly.
- ERM Assessment Information Section: The Start Date, End Date, Fiscal Year Quarter #, and the work shift name must all be completed correctly.
- The Work Area must be identified as appropriate for applicable Network Operation Locations.
Note: it is acceptable if only the quarter is listed and not the fiscal year (e.g., "Q3" instead of "FY24Q3").
- ERM Team Section: The EC name and the team member names must be completed correctly.
Note: The EC is not required to gather a team to complete the assessment if the work shift has fewer than 10 employees unless located in the state of California or New York.`},
{id:"CORP-ERM-009.00",w:1,wq:true,text:`For network operations with multiple managing directors per shift (e.g., Memphis and Indianapolis air hubs), was an assessment completed for at least one sort work area that managing director oversees?

Note: All sort work areas under the managing director's overarching operation must be assessed annually.`},
{id:"CORP-ERM-010.00",w:1,wq:true,text:`For other network operation locations, was an assessment completed on a different work shift than the previous quarter?

Determine if the assessment was completed on a different work shift than the previous quarter.
- If the assessment was completed on a different work shift, mark this question as compliant.
- If the same work shift was assessed in the previous quarter because all possible shifts were evaluated and no other shifts existed to assess (or there is only one shift), mark this question as compliant.
- If no ERM assessments have ever been completed at the facility (e.g., a new facility) answer with a "n/a" and explain in the comment box.
- If an ERM assessment was not completed the previous quarter, look back to the last time the assessment was completed to answer the question. Explain what was reviewed in the comment box.`},
{id:"CORP-ERM-004.01",w:1,wq:true,text:`Was the SF-730 signed and dated by the Ergonomics Champion, Safety Support Personnel, and Location Senior Management/Appointed Management Designee within the quarter?

Determine if the SF-730 was signed and dated by the Ergonomics Champion (EC), the overseeing Safety Support Personnel, and Location Senior Management or Appointed Management Designee. To be compliant, the signatures must have been obtained within the quarter the assessment was conducted.
Note: electronic signatures are acceptable. For those that do not have access to an electronic signature, the user can enter '/s/' followed by their printed name in the signature field.`},
{id:"CORP-ERM-005.00",w:1,wq:true,text:`Did each topic receive a mark?

Determine if all topic lines received a mark. To be compliant, each item in each section must be marked "Yes/No/NA" or "Full/Mostly/Somewhat/None/NA" as applicable.`},
{id:"CORP-ERM-007.01",w:1,wq:true,text:`Were ALL items marked as "FULL"?

Determine if any items were marked Mostly, Somewhat or None.
Note: If any were marked as 'mostly', 'somewhat' or 'none' answer 'NO'
Note: if item 1.4 is the only item on the SF-730 marked as "Mostly/Somewhat/None", answer this question as "YES".

This is a conditional question.`},
{id:"CORP-ERM-007a.00",w:1,wq:true,text:`Was an action plan created based on the SF-730 assessment results by the end of the quarter?

Determine if all items marked Mostly, Somewhat, or None had a documented action plan created by the end of the quarter the assessment occurred in. The action plan was required to be documented on the ERM Assessment Action Plan Template and filed locally.
Note: The action plan being reviewed is not an action plan for the CSM, it is an action plan for the Ergonomic Risk Mitigation assessment deficiencies found.
Note: It is acceptable to have separate action plans for each item or to group them together within an action plan. However, all items marked Mostly, Somewhat, or None must be included in an action plan.`},
{id:"CORP-ERM-011.00",w:1,wq:true,text:`Was a member of the safety committee included within the ERM Assessment team to ensure his or her input was included within the assessment?

Note: ONLY Applies to New York State locations. All other locations select NA option.`},
{id:"CORP-ERM-012.00",w:1,wq:true,text:`Was the most recent SF-730 and its action plan (if applicable) posted with the safety committee meeting minutes?

Note: ONLY Applies to New York State locations. All other locations select NA option.`}
]},
{id:"dat-wsi",code:"WSI",title:"Workplace Safety Inspection",items:[
{id:"CORP-WSI-001.00",w:2,text:`Was the Workplace Safety Inspection (SF-142) completed each month for the previous 3 months?`},
{id:"CORP-WSI-002.00",w:2,text:`Are each of the SF-142s properly completed?

Note: Proper completion includes Participant and Information sections accurately completed; all inspection items have a 'Yes', 'No', or 'N/A' selected; the documented completion date is within the designated inspection month; and site senior management signed the acknowledgement section. (Test all completed forms, if no forms were completed in the previous 3 months, answer with a NA.)`},
{id:"CORP-WSI-003.00",w:0,text:`Were there any safety concerns documented on any of the SF-142s?

This is a conditional question. It will not impact points. All responses are considered correct.`},
{id:"CORP-WSI-003a.00",w:1,text:`Are all safety concerns listed in the summary and follow-up section?`},
{id:"CORP-WSI-003b.00",w:1,text:`Were all safety concerns documented in the Workplace Safety Log within 7 days of the inspection completion date?`},
{id:"CORP-WSI-004.00",w:1,text:`Are all Workplace Safety Inspection Forms on file since Sept 6, 2024?

Note: Retention period - 10-years, effective September 2024.
(Points driven conditional question.)`},
{id:"CORP-WSI-004a.00",w:0,text:`Has the facility answered CORP-WSI-004 as non-compliant anytime since September 2024?

Note: Enter month of your last non-compliance in comment section.

This is a conditional question.`},
{id:"CORP-WSI-004b.00",w:1,text:`Have you retained all forms since your last non-compliance?`}
]},
{id:"dat-tsa",code:"TSA",title:"Security & TSA",items:[
{id:"CORP-TSA-001.01",w:1,wq:true,text:`Are Known Expedite Shippers identified correctly utilizing FlightShield when expediting.

This can be accessed at keyword "Known Shipper".`},
{id:"CORP-TSA-004.01",w:1,wq:true,text:`The Expedite and/or Interline Manifest Forms are completed and filed with the required documents (retention 30 days)?`},
{id:"CORP-TSA-010.01",w:1,wq:true,text:`Does the location have procedures in place to adhere to challenge requirements as stated in the regulatory compliance section of the security chapter in the Go Express manual?`},
{id:"CORP-TSA-011.02",w:1,wq:true,text:`Does the location adhere to the Indirect Air Carriers (IAC) cargo acceptance guidelines outlined on the Security Compliance (seccom) intranet site, specifically 30 day record retention of written certification accepted from an Indirect Air Carrier (IAC)?`},
{id:"AGFS-TSA-012.02",w:1,wq:true,text:`Are all required Security Identification Display Area (SIDA) files maintained separately, including maintaining separate files for each individual (this includes vendors, employees of other FedEx companies, and FedEx employment applicants)?`},
{id:"CORP-TSA-014.01",w:1,wq:true,text:`Do all employees and vendors working at the facility have an active Security Threat Assessment (STA) or acceptable STA qualifier? (Keyword: STA for requirement compliance)`},
{id:"CORP-TSA-014.00a",w:1,wq:true,text:`Attach your location's current STA ORG report.`},
{id:"CORP-TSA-016.03",w:1,wq:true,text:`Are all unauthorized FedEx Express employees and/or Non-FedEx individuals escorted while on FedEx premises? STA related.

- Non-badged vendors (Janitorial, Vehicle Wash, Maintenance)
- Individuals pending STA approval (e.g. new hires, expired STA)
- Employees transferring from a SIDA location to a non-SIDA location
- Employees of other FedEx operating companies (Ground Driver, Sales Executives)`},
{id:"CORP-TSA-017.00",w:1,wq:true,text:`Are all unauthorized FedEx Express employees and/or Non-FedEx individuals escorted while on FedEx premises? SIDA Related.

- All employees unless possessing a SIDA for the specific ramp must be escorted at all times.
- All Jumpseaters, including jumpseating and active flight crewmembers, are escorted through the SIDA area of each facility to and from the aircraft.`},
{id:"CORP-TSA-018.00",w:1,wq:true,text:`Is your location 100% compliant for SIDA Badging for all employees that have unescorted access to the designated SIDA areas of an airport?

- Note: Federal regulations require the local airport authority and aircraft operators to adhere to guidelines established by the Transportation Security Administration (TSA).`},
{id:"CORP-TSA-018.00a",w:1,wq:true,text:`Attach your location's current SIDA ORG report.`}
]},
{id:"dat-sec",code:"SEC",title:"Facility / Asset Security",items:[
{id:"CORP-SEC-001.01",w:1,wq:true,text:`Are the appropriate signs posted? (i.e. ID Requirements (customers paying with credit card), Authorized Personnel Only, ID Badges Must Be Displayed, Subject to Search, Lockers are Property of FedEx, No Weapons) (signage is available on the ARC site or POP Solutions)`},
{id:"CORP-SEC-002.02",w:1,wq:true,text:`Facility Security - (A 'No' to any of the following elements results in a NO to the entire question.)

- Is the alarm system in good working order?
- Are alarm codes controlled and appropriate based on the type of equipment (e.g. new equipment with the option to NOT share codes is required)
- Are the alarm codes changed with terminations
- Are the employees assigned access to the alarm code accurate based on their job duties?`},
{id:"CORP-SEC-003.01",w:1,wq:true,text:`Are FedEx vehicles secured from public access?
- Are all FedEx vehicles (trucks, vans, trailers, leases) that are parked outside properly secured as required?
- Are all FedEx vehicles parked in authorized areas?`},
{id:"CORP-SEC-005.01",w:1,wq:true,text:`Do all employees, vendors, and visitors with access/keys to the facility have a legitimate purpose for this access? (Ref: Aircraft Ramp Ops Manual, R2-15-30)`},
{id:"CORP-SEC-007.02",w:1,wq:true,text:`Are all trailers which contain cargo properly locked or sealed prior to departure?
- Trailers from Customer Locations
- Station CTV
- Location to Location transport`},
{id:"CORP-SEC-008.02",w:1,wq:true,text:`Are all vulnerable areas (high value cage, send again cage, HAL packages, communications/CCTV room) of the facility locked and secured?`},
{id:"CORP-SEC-009.02",w:1,wq:true,text:`Are all keys controlled, listed and signed for and key lock box(es) properly secured, and locked at all times?

- This list should include keys for offices, file cabinets containing sensitive information, etc. as well as keys/access provided by customers.
- Is there a process in place to ensure all keys are returned for terminated and/or transferred employees?

Upload a copy of the Key Control Log for your location in CORP-SEC-009.02a`},
{id:"CORP-SEC-009.02a",w:1,wq:true,text:`Upload a copy of the Key Control Log for your location.`},
{id:"CORP-SEC-011.02",w:1,wq:true,text:`Are all facility doors secured or staffed when open (e.g. unauthorized personnel are challenged)? (Ref: Aircraft Ramp Ops Manual, R2-15-30)

- Is a designated person responsible for securing the premises at the close of business
- If fencing is installed is it adequate and in good repair
- If electronic gate is installed is it in good working order`},
{id:"CORP-SEC-012.03",w:1,wq:true,text:`Do all employees wear FedEx ID badges and appropriate airport badges where applicable and as required by policy (visible above the waist), and are known procedures in place for lost/stolen ID badges including the Acceptable Conduct Policy?

- This includes all individuals involved in aircraft servicing operations, including fueling operations wear a visible airport badge.`},
{id:"CORP-SEC-020.02",w:1,wq:true,text:`Is a current Emergency Contact List posted as required?

- if 911 isn't an option
- Local Police
- Local fire department
- Local doctor
- Ramp Locations
- Airport police
- Control Tower
- FAA
- GOC
- Aircraft fueling contractor
- Flight Service
- Alarm system monitoring service (Global Security Communication Center)
- Corporate Security
- Federal Agencies
- Instructions on to how to notify Transportation Security Operations Center (TSOC)
- Corporate Safety`},
{id:"CORP-SEC-021.01",w:1,wq:true,text:`Is the approved visitor log in use and completed in full as required?

- Entries must be legible and all required sections completed
- Is the visitor log retained for 90 days?
- Must be located where visitors enter, e.g. Front counter, security check point`},
{id:"CORP-SEC-029.01",w:1,wq:true,text:`Are all sets of vehicle keys secured as outlined in GO: Express Security Policy?`},
{id:"CORP-SEC-030.00",w:1,wq:true,text:`Does your facility have any Simplex locks? - Conditional Question`},
{id:"CORP-SEC-030a.00",w:1,wq:true,text:`Have all Simplex Locks been updated within the past 90 days and has the Simplex Lock Form been completed after the Simplex locks were updated with a new code?

- Note: If you had an employee leave your location for any reason, including but not limited to termination or transfer, the code must be changed.
- Please reference the policy for additional requirements.`},
{id:"AGFS-SEC-023.01",w:1,wq:true,text:`Does the location have a KEYper, Pegboard, Key Accountability System, or positive control process for vehicle key control at all times? If security cameras are available, is the KEYper board installed in view of security cameras?

Note: If the question answered YES due to Positive control, comment required for explanation.`},
{id:"AGFS-SEC-024.00",w:1,wq:true,text:`Does your location have a key control log for all RTD's, TCA's or mule drivers, managers, and vehicle maintenance which have been issued pegs?`},
{id:"AGFS-SEC-025.00",w:1,wq:true,text:`If the Keyper, Pegboard, or Key Accountability System is utilized within your location do you have a signed AGFS Issuance of Company Property (IOCP) on file for each assigned employee?`},
{id:"AGFS-SEC-026.01",w:1,wq:true,text:`Are the locations vehicle keys maintained as follows:

1 Set - Keyper / pegboard / positive Secure Control (Employee utilized)?
Additional Sets - Secured by designated Manager and/or Senior Manager?

Note: if No is answered to any of the above - answer NO to the question.`},
{id:"CORP-SEC-032.00",w:1,wq:true,text:`Is your location compliant on the required bolt seals for all loaded trailers and containers moving from FedEx locations and customer spots.

- Security -- Safeguarding packages with bolt seals | The Source (fedex.com)
- Effective October 1, 2024
- N/A only applicable if your location does not have trailers and/or containers moving from FedEx locations and/or customer spots.`}
]},
{id:"dat-rsec",code:"RSEC",title:"Ramp / Freight Regulatory Security",items:[
{id:"AGFS-SEC-003.03",w:1,wq:true,text:`Ramp Security: Are ALL unattended aircraft on the ramp secured?

- Access doors closed, verified by ramp manager, or qualified designee
- Stairs removed or security cage is locked or secured after load operations
- Cage is locked if stairs with a security cage are left mated to aircraft
- Cage is unlocked if stairs with a security cage are staged away from aircraft
- Loaders left mated to the aircraft are lowered to down position when cargo doors have been closed after load activity
- Unattended aircraft are either guarded or rendered inaccessible by closing access doors and moving GSE outside of the aircraft silhouette`},
{id:"AGFS-SEC-004.00",w:1,wq:true,text:`If the ramp has the first operation of an aircraft for the day, is the A/C searched prior to the first operation, as required by the TSA Security Program?`},
{id:"AGFS-SEC-005.00",w:1,wq:true,text:`Does the ramp have appropriate procedures in place for screening crews and jumpseaters? (Ref: Aircraft Ramp Ops Manual, R2-15-30)`},
{id:"AGFS-SEC-006.00",w:1,wq:true,text:`SIDA documentation is accurate per the file documentation and record keeping memo (For requirements and memo, see keyword: SIDA). If no one is required, score yes.`},
{id:"AGFS-SEC-007.01",w:1,wq:true,text:`All employees required to have a SIDA badge have one, are current, and have been verified via the ESSO image system (Keyword: IMAGE).

(Note: If the employee is in the process of obtaining a SIDA badge, ensure that the employee is currently using the escort process and has been issued an escort vest/armband before answering yes).`},
{id:"AGFS-SEC-008.00",w:1,wq:true,text:`In the Comments Section, please indicate the name of the current SIDA contact for your location. Is that name listed on the FedEx SIDA intranet list of current SIDA contacts? Note: If the location is not a required SIDA location, select does not apply. (For list of current SIDA Contacts, see keyword: SIDA)`},
{id:"AGFS-SEC-009.00",w:1,wq:true,text:`Are all terminated employee SIDA badges collected and submitted to the appropriate department [e.g. airport issued SIDA badges are return to SIDA Contact and FedEx issued SIDA badges are returned to Corporate ID]? [Note: In addition to ramp employees, verify all off-sight employees with ramp access have not been terminated (e.g. Heavyweight and/or USGO employees)].

- Note: Terminated = retired, resigned, and fired (end of employment)`},
{id:"AGFS-SEC-010.01",w:1,wq:true,text:`Ramp is in compliance with Cargo Screening policy for heavyweight cargo:

- Excluding cargo in the Cargo Screening Exemption List, a cargo screening is performed and documented on any SINGLE piece of cargo that weighs over 150 pounds (68 kilograms) prior to transport and loading onboard the aircraft for the first air leg to, from, and within the U.S. to ensure there are no unauthorized persons, weapons, explosives, incendiaries, and other destructive devices, items, or substances present.
- Cargo Screening Logs are completed daily and retained on file for 30 days.
- Cargo Screening Forms are completed online no later than Friday of each week.

Ref: [QAB 07-R52, FHB573, FedEx Express U.S. & International Freight Services: Policies & Procedures]`},
{id:"AGFS-SEC-011.01a",w:1,wq:true,text:`Does your location have a primary and secondary Management contact on file with local airport authority for notifications on security tabletop exercises?`},
{id:"AGFS-SEC-011.01b",w:1,wq:true,text:`Enter Employee # of Manager contact listed with local airport authority
- Primary
- Secondary`}
]},
{id:"dat-iosa",code:"IOSA",title:"IOSA Security",items:[
{id:"IOSA-SEC-001.00",w:1,wq:true,text:`Do all U.S. jumpseaters and operational flight crews pass through automated screening devices such as x-ray and/or walk-through metal detectors (WTMD) or at locations not equipped with automated equipment, jumpseaters or off-duty flight crew members traveling as jumpseaters' bags, luggage, briefcases, purses, shopping bags, giftwrapped items (must be unwrapped) etc. are opened and hand-searched?`},
{id:"IOSA-SEC-002.00",w:1,wq:true,text:`Do all Jumpseat passengers have proper identification before boarding any FedEx Express aircraft?

- Passenger's company ID must be checked against the picture that is displayed in the intranet check-in system or if the check-in system is down or a message appears that states the photo is not available, the jumpseater must produce a government issued photo ID such as a passport or driver's license to use as verification in addition to the company ID.`},
{id:"IOSA-SEC-003.00",w:1,wq:true,text:`After screening is a FedEx Baggage Security Tag completed and attached to each piece of baggage indicating it has been screened and/or searched?`},
{id:"IOSA-SEC-004.00",w:1,wq:true,text:`Bulk items as identified by the Transportation Security Administration (TSA) regulations and FedEx, such as golf clubs, fishing poles, and other bulk items are prohibited on the flight deck. Jumpseaters either do not have bulk items or the ramp weighs the bulk item(s), fills out a bulk slip, notes the number of pieces and load location on the FDR and loads the items in an approved inaccessible area. Have these requirements been verified and checked for compliance for all jumpseaters and flights?`},
{id:"IOSA-SEC-005.00",w:1,wq:true,text:`After Jumpseater's bags have been screened, are they staged in a designated area, where unsupervised access to bags is not permitted?`},
{id:"IOSA-SEC-006.00",w:1,wq:true,text:`Are all jumpseaters, including jumpseating flight crewmembers escorted through the SIDA area of each facility to and from the aircraft?`},
{id:"IOSA-SEC-007.00",w:1,wq:true,text:`Does a Ramp Agent, within 30 minutes of departure, examine the ID of each operational flight crewmember and jumpseater by verifying that the ID matches the person presenting it and each name and employee listed on the printout of the Weight and Balance Verification Manifest, or if dispatched electronically, scans the flight crewmember's and jumpseater's ID badges with the AutoVerify handheld device?`},
{id:"IOSA-SEC-008.00",w:1,wq:true,text:`Do all personnel escorting arriving jumpseaters through the SIDA area ensure all FedEx Baggage Security Tags are removed, before they exit the facility?`},
{id:"IOSA-SEC-009.00",w:1,wq:true,text:`Do all individuals involved in aircraft servicing operations, including fueling operations wear a visible airport badge?`},
{id:"IOSA-SEC-010.00",w:1,wq:true,text:`Can the Operation provide evidence of receipt of the Quality Assurance Bulletin?

- AROM 0-3`},
{id:"IOSA-SEC-011.00",w:1,wq:true,text:`For vendor handled locations, the appropriate Quality Assurance Bulletins have been forwarded or sent to vendor management team?

- AROM 0-3`},
{id:"IOSA-SEC-012.00",w:1,wq:true,text:`Only approved ground support equipment is used to access/open/close aircraft lower cargo doors?

- AROM 2-85-5`},
{id:"IOSA-SEC-013.00",w:1,wq:true,text:`All Aircraft chocks are clear of silhouette upon aircraft arrival and departure?

- AROM 3-5-10`},
{id:"IOSA-SEC-014.00",w:1,wq:true,text:`Orientation arrows for live animals and perishable shipments are observed when possible?

- AROM 3-5-75 and 8-30`}
]},
{id:"dat-trn",code:"TRN",title:"Training",items:[
{id:"CORP-TRN-054C.00",w:1,wq:true,text:`Training Communication & Document Control: Does your location handle RKN or RAP Containers?

RKN = Cool Can
RAP = International Cool Can`},
{id:"CORP-TRN-054.01",w:1,wq:true,text:`Are all ramp handling employees, requiring Active Container Training for RKNs and RAPs, properly trained?`},
{id:"CORP-TRN-002.00",w:1,wq:true,text:`Training Dangerous Goods: Have all employees and managers within this location completed the annual Hazardous Awareness training, CHAPCBT?`},
{id:"CORP-TRN-003.00",w:1,wq:true,text:`Have all employees and managers within this location completed the annual Dangerous Goods and Handling training, CDGHCBT?`},
{id:"CORP-TRN-004.00",w:1,wq:true,text:`Have all employees and managers within this location completed the DG In-Depth Security training, CDGST1 as required per policy?`},
{id:"CORP-TRN-016.01",w:1,wq:true,text:`Are all the current Dangerous Goods Specialists at this location 100% trained on all DG courses required for their position as outlined by their organization? (AGFS, MSL, or US Operations)`},
{id:"CORP-TRN-017.01",w:1,wq:true,text:`Are all the current Dangerous Goods Spill Cleanup Specialists at this location 100% trained on all DG courses required for their position as outlined by their organization? (AGFS, MSL, or US Operations)

Note: A Dangerous Goods Spill Cleanup Specialist is not required to be a Dangerous Goods Specialist, but must have completed the Spill Cleanup portion of the Dangerous Goods Specialist instructor led training. The training check must also validate completion of the Clean Harbors Medical Waste Mailback Program, CMWDMSI, for US Locations`},
{id:"CORP-TRN-017.01a",w:1,wq:true,text:`Are members of management at this location 100% trained on all DG supervisory courses required for their position as outlined by their organization? (AGFS, MSL, or US Operations)

Note: The training check must also validate location required compliance such as CDGSMGR or CDGSMGRI, CDGSR or CDGSREC and required equivalents. Management responsible for Dangerous Goods Specialists actively using their certification must also be current as Dangerous Goods Specialist.`},
{id:"CORP-TRN-018.00",w:1,wq:true,text:`Are all employees, and managers of employees, currently performing functions which require the training course codes listed below, trained in SMS Basics M910571?

- CAE101/CDGSR`},
{id:"CORP-TRN-027.00",w:1,wq:true,text:`Are there a minimum of two currently trained DG Specialists/Agents who are Workbench DG trained at this location?`},
{id:"CORP-TRN-052.00",w:1,wq:true,text:`Training Dimensions: Have all location employees completed the Dimensions eAcknowledgement?`},
{id:"CORP-TRN-019.00",w:1,wq:true,text:`Training Environmental: Within the last 12 months has the LEC completed the required CENVLEC environmental training module in FLC?

- LECs must complete training within 30 days of GEMIS designation; and recurrent training annually`},
{id:"CORP-TRN-019.00a",w:1,wq:true,text:`Within the last 12 months has the LEC completed the required CENVUST environmental training module in FLC?

- This pertains to locations that have a UST. If you do not have an underground storage tank, answer NA.`},
{id:"CORP-TRN-020.00",w:1,wq:true,text:`Have applicable manager(s) at the location completed the annual environmental module CENVSPL (see Environmental P&P Section 11-2.0 for applicability). Manager Spill training (CENVSPL) is required for direct managers of employees and/or vendors assigned to perform the following on-site activities:

- Aircraft or pavement de-icing
- Dangerous goods spill cleanup specialists
- Equipment washing (e.g., vehicles, GSE, aircraft)
- Fueling
- Location Environmental Coordinator (LEC) function
- Monitoring equipment washing performed by vendors
- Waste handling`},
{id:"CORP-TRN-028.00",w:1,wq:true,text:`Have applicable aircraft, vehicle, and/or facilities technicians completed required CENVMX environmental training within the last 12 months? (See Environmental P&P Chapter 11 for applicability)

- Location is required to maintain training records in the Location Environmental File for all technicians working at the location.
- NA is permitted IF the aircraft, vehicle, and facility maintenance occur off-site or if the technician(s) are domiciled off-site.`},
{id:"CORP-TRN-029.00",w:1,wq:true,text:`Has the individual who signed each waste manifest or waste shipping document completed the appropriate training (either CENVLEC, CENVMX or CENVWM) within the 12 months preceding the date of signing?

Note: Timely completion of CSCUIT (DG Spill Clean Up) training also qualifies as appropriate training.
- Test the previous twelve months.
- Responding NA is permitted only IF no waste was shipped from the site.`},
{id:"CORP-TRN-030.00",w:1,wq:true,text:`Have the vehicle and or equipment wash observer(s) completed water quality training (either CENVWQA, CENVMX, CENVSPL or CENVLEC), within the 12 months preceding their last observation date?

- Responding NA is only permitted if the vehicle/equipment washing does not occur on-site.`},
{id:"CORP-TRN-025.00",w:1,wq:true,text:`Training Genesis: Have the location's GENESIS Operators completed the required training course CGENGIO? (Minimum of 2 required).`},
{id:"CORP-TRN-026.00",w:1,wq:true,text:`Has the location's Manager responsible for GENESIS operations completed the required GENESIS training CGENMGR?`},
{id:"CORP-TRN-009.00",w:1,wq:true,text:`Training HOS: Are all employees in a DOT, Non-DOT, or DOT/CDL position that drive a FedEx vehicle 100% compliant with the HOS Training CHOS?`},
{id:"CORP-TRN-009.00a",w:1,wq:true,text:`Did any employee have an HOS violation of any type within the last six months? (Conditional Question)`},
{id:"CORP-TRN-009.00b",w:1,wq:true,text:`If an employee had an HOS violation of any type within the last 6 months, did they retake the CHOS training?`},
{id:"CORP-TRN-011.01",w:1,wq:true,text:`Training OFCCP: Are all the managers including the senior manager, and hourly employees where applicable, at this location current for Avoiding Sexual Harassment in the Workplace training?

- Please reference the CSM Survival Guide for a current list of states that require this training and the applicable training. (Keyword: Survival Guide)`},
{id:"CORP-TRN-012.00",w:1,wq:true,text:`Training Safety: Are all employees and managers at this location 100% trained on the annual Workplace Violence training CWPV2?`},
{id:"CORP-TRN-035.00",w:1,wq:true,text:`Are all QDST members appropriately trained in QDST Computer Based Training CSCIT01?`},
{id:"CORP-TRN-013.00",w:1,wq:true,text:`Training Security: Have all employees (temporary, part-time, and full-time) completed general security awareness training (course code: CGSATJ)?`},
{id:"CORP-TRN-031.01",w:1,wq:true,text:`Have expediting employees and US employees who tender freight to Freight Forwarders, handle expediting, interline moves, responsible for vendor contracts or who come in contact in any way with cargo tendered to a passenger air carrier have successfully completed Security Training? (Security Training: CTSASEC)`},
{id:"CORP-TRN-032.00",w:1,wq:true,text:`Have all badged vendors and authorized representatives with unescorted access to air cargo completed general security awareness training (course code: CGSATJ)?

- All training records must be maintained for a minimum of 90 calendar days after termination of duty.`},
{id:"CORP-TRN-050.00",w:1,wq:true,text:`Are all US domestic and international weight and balance qualified employees who check in and/or screen jumpseaters and operational crewmembers have completed CJUMPER/CJUMPEP within the previous 12 months.`},
{id:"CORP-TRN-033.00",w:1,wq:true,text:`Training ULD: Are all the employees at this location 100% trained on all the ULD required training for their current position?`}
]},
