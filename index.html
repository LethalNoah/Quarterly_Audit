<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>FXE Station Audits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#120B1E; --panel:#1B1130; --panel2:#241740; --line:#372659;
    --amber:#FF6600; --purple:#7B2FE0; --purpledeep:#4D148C;
    --green:#34C77B; --red:#F0544F; --na:#8E86A5;
    --text:#F5F3FA; --muted:#A79FC0;
    --mono:'IBM Plex Mono',monospace; --cond:'Barlow Condensed',sans-serif; --body:'Barlow',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);font-size:16px;line-height:1.45}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .topbar{position:sticky;top:0;z-index:50;background:rgba(18,11,30,.93);backdrop-filter:blur(8px);
    border-bottom:2px solid var(--purpledeep);padding:10px 14px;display:flex;align-items:center;gap:10px;
    padding-top:max(10px, env(safe-area-inset-top))}
  .topbar .back{background:none;border:1px solid var(--line);color:var(--text);border-radius:8px;
    font-family:var(--cond);font-size:15px;letter-spacing:.04em;padding:6px 12px;cursor:pointer;display:none}
  .topbar .back.show{display:block}
  .brand{font-family:var(--cond);font-weight:700;font-size:19px;letter-spacing:.06em;text-transform:uppercase;color:#FFFFFF}
  .brand small{display:block;font-family:var(--mono);font-weight:400;font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:none}
  .scorepill{margin-left:auto;text-align:right}
  .scorepill .pct{font-family:var(--cond);font-weight:700;font-size:22px;color:var(--amber);line-height:1}
  .scorepill .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--muted)}
  .wrap{max-width:720px;margin:0 auto;padding:14px 14px 90px}
  .runway{position:relative;height:12px;border-radius:6px;background:var(--panel2);overflow:hidden;border:1px solid var(--purpledeep)}
  .runway .fill{position:absolute;inset:0;width:0%;background:var(--amber);transition:width .35s ease}
  .runway .fill::after{content:"";position:absolute;top:50%;left:0;right:0;height:2px;transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,rgba(18,11,30,.85) 0 14px,transparent 14px 26px)}
  .runway.green .fill{background:var(--green)}
  .cards{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--purple);border-radius:10px;
    padding:12px 14px;cursor:pointer;transition:transform .06s ease}
  .card:active{transform:scale(.985)}
  .card.done{border-left-color:var(--green)}
  .card .code{font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:.08em}
  .card.done .code{color:var(--green)}
  .card h2{margin:2px 0 8px;font-family:var(--cond);font-weight:600;font-size:20px;letter-spacing:.03em;text-transform:uppercase;color:#FFFFFF}
  .card .meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;
    font-family:var(--mono);font-size:11px;color:var(--muted);gap:8px;flex-wrap:wrap}
  .card .meta .flag{color:var(--red)}
  .card .meta .stamp{color:var(--green)}
  .overall{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .overall h1{margin:0 0 4px;font-family:var(--cond);font-weight:700;font-size:24px;letter-spacing:.04em;text-transform:uppercase;color:#FFFFFF}
  .overall .sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:10px}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .stat{background:var(--panel2);border-radius:8px;padding:8px 10px;text-align:center}
  .stat .n{font-family:var(--cond);font-weight:700;font-size:20px}
  .stat .n.g{color:var(--green)} .stat .n.r{color:var(--red)} .stat .n.m{color:var(--muted)}
  .stat .l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--muted)}
  .sechead{margin:6px 0 12px}
  .sechead .code{font-family:var(--mono);font-size:12px;color:var(--amber);letter-spacing:.1em}
  .sechead h1{color:#FFFFFF;margin:2px 0 8px;font-family:var(--cond);font-weight:700;font-size:26px;letter-spacing:.03em;text-transform:uppercase;
    border-left:4px solid var(--purple);padding-left:10px}
  .filters{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
  .chip{font-family:var(--cond);font-size:15px;letter-spacing:.05em;padding:6px 14px;border-radius:999px;
    border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer}
  .chip.on{border-color:var(--amber);color:var(--amber)}
  .chip .ct{font-family:var(--mono);font-size:11px;margin-left:4px}
  .item{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .item .head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .item .id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--amber);letter-spacing:.06em}
  .item .wt{font-family:var(--mono);font-size:10px;color:#FFFFFF;background:var(--purpledeep);border-radius:4px;padding:1px 6px}
  .item .when{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .item .txt{margin:8px 0 10px;font-size:15px;color:var(--text);white-space:pre-line}
  .item .txt.clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .morebtn{background:none;border:none;color:var(--amber);font-family:var(--mono);font-size:11px;padding:0 0 8px;cursor:pointer;letter-spacing:.06em}
  .pending{color:var(--amber);font-family:var(--mono);font-size:11px}
  .answers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .abtn{font-family:var(--cond);font-weight:600;font-size:16px;letter-spacing:.05em;padding:10px 4px;border-radius:8px;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer}
  .abtn.c.on{background:rgba(52,199,123,.16);border-color:var(--green);color:var(--green)}
  .abtn.n.on{background:rgba(240,84,79,.14);border-color:var(--red);color:var(--red)}
  .abtn.x.on{background:rgba(126,138,160,.16);border-color:var(--na);color:var(--na)}
  .cmtbtn{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:8px 0 0;cursor:pointer}
  .cmtbtn.has{color:var(--amber)}
  textarea.cmt{width:100%;margin-top:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);font-family:var(--body);font-size:14px;padding:8px;min-height:64px;display:none}
  textarea.cmt.show{display:block}
  .nc-hint{font-family:var(--mono);font-size:10px;color:var(--red);margin-top:6px}
  .fab{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(18,11,30,.94);backdrop-filter:blur(8px);
    border-top:2px solid var(--purpledeep);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .fab button{font-family:var(--cond);font-size:15px;letter-spacing:.05em;padding:9px 18px;border-radius:8px;
    border:1px solid var(--line);background:var(--panel);color:var(--text);cursor:pointer}
  .fab button.primary{border-color:var(--amber);color:var(--amber)}
  .fab button.danger{border-color:var(--red);color:var(--red);padding:9px 14px}
  .fab button.danger.arm{background:var(--red);color:#FFFFFF}
  .fab .fabtoggle{position:absolute;top:-28px;left:50%;transform:translateX(-50%);
    width:68px;height:28px;padding:0;border:2px solid var(--amber);border-bottom:none;
    border-radius:12px 12px 0 0;background:rgba(18,11,30,.96);color:var(--amber);
    font-size:13px;font-weight:700;line-height:1;cursor:pointer;
    box-shadow:0 -3px 10px rgba(255,102,0,.25)}
  .fab .fabtoggle:active{background:var(--amber);color:#120B1E}
  .fab{position:fixed}
  .fab.min button:not(.fabtoggle){display:none}
  .fab.min{padding-top:2px;padding-bottom:calc(2px + env(safe-area-inset-bottom))}
  .toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--amber);
    color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 16px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:60}
  .toast.show{opacity:1}
  .audit .code{color:var(--amber)}
  .audit h2{font-size:22px}
  .audit .desc{font-family:var(--mono);font-size:11px;color:var(--muted);margin:-4px 0 8px}
  .item .wt.unk{background:transparent;border:1px solid var(--muted);color:var(--muted)}
  .comingsoon{opacity:.45;pointer-events:none}
  .comingsoon h2::after{content:" - coming soon";font-size:13px;color:var(--muted);text-transform:none}
</style>
</head>
<body>
<div class="topbar">
  <button class="back" id="backBtn">&#8592; Back</button>
  <div class="brand" id="brand">FXE Station Audits<small id="brandSub">3 audits &middot; <span id="itemCount">--</span> items</small></div>
  <div class="scorepill"><div class="pct" id="topPct">--%</div><div class="lbl">SCORE</div></div>
</div>
<div class="wrap" id="app"></div>
<div class="fab" id="fab">
  <button id="fabToggle" class="fabtoggle" aria-label="Hide menu">&#9660;</button>
  <button id="resetBtn" class="danger">Reset</button>
  <button id="plainBtn">Plain English</button>
  <button id="exportBtn">Copy summary</button>
  <button class="primary" id="openBtn">Jump to open items</button>
</div>
<div class="toast" id="toast"></div>
<script>
const SECTIONS = [
{id:"adm",code:"SECTION 1.0",title:"Administrative",items:[
{id:"ADM-001",w:1,text:`M-Forms required for ramp operations that are not available via the intranet, that cannot be printed locally (multiple carbon copy, hard copy checklists required for flight, laminated, stickers, plastic/metal tags, or in color) are included on the station publications list, maintained current, and kept in a designated area marked "CONTROLLED" or at a point of usage location. Ramp M-Forms at point of usage locations are limited to a quantity to support operational requirements.`},
{id:"ADM-002",w:1,text:`Ramp operations online manuals are the only current manuals to be used in the operation, which all management and employees have access to.`},
{id:"ADM-003",w:1,text:`The Ramp Publication List of controlled manuals and forms is printed, or if the station has set up a location specific listing in the TPS system the audit may be conducted electronically. Once every fiscal quarter an audit of all controlled manuals/forms is conducted to ensure the current revision number and date. The designated person performing the paper audit signs the required TPS reports or locally developed cover sheet with all required TPS reports attached and files it at the location for 12 months.

Current General Ramp Publication Lists:
O-6821 - FedEx Ramp B757
O-6822 - FedEx Ramp MD11/MD10
O-6823 - FedEx Ramp B777
O-6824 - FedEx Ramp A300/A310
O-6825 - FedEx Ramp/Feeder U.S. Domestic
O-6826 - FedEx Ramp/International Addendum
O-6828 - FedEx Ramp/Feeder LAC
O-6852 - FedEx Ramp/Feeder Europe/AMEA
O-6853 - FedEx Ramp/Feeder Canada
O-6869 - FedEx Ramp 767
O-6883 - Ramp Master
O-6884 - Ramp Optional
O-6885 - Ramp Manuals`},
{id:"ADM-004",w:1,text:`Current copies of the International Air Transport Association (IATA) Dangerous Goods Regulations (DGR) Manual are retained at the station, including any currently issued Addendums.`},
{id:"ADM-005",w:1,text:`A self-audit is conducted quarterly utilizing Control Self-Monitoring (CSM) AOD CSM Self Audit. Access the CSM Home Page or, when applicable, Ramps that do not have access to CSM utilize the AOC QA IEP/AW Ramp Operations Checklist located on the RHE website (keyword "RHE"). Ramps not using the CSM must retain the 4 most recent completed self-audits on file in a hard copy or electronic format.`},
{id:"ADM-006",w:1,text:`Ramp internal self-audits non-compliant items have a root cause analysis and corrective action completed within 15 days or by the due date contained in the AOD CSM Self Audit.`},
{id:"ADM-007",w:1,text:`Discrepancy reports at a minimum are generated whenever an internal/external discrepancy occurs as a result of incomplete or incorrect documents, non-serviceable ULD usage, load plan discrepancies, or any other discrepancy that affects the ramp operation. Correctly completed discrepancy and corrective action reports contain the required elements, including the following, and are retained in a separate 30-day hard copy, word document, or email/electronic file system.
1. What is the extent of the discrepancy? Do not focus on the specific finding, instead determine the extent within the whole operation.
2. Why did the problem occur?
3. What action has been taken or planned to correct the problem?
4. What action will be taken to keep the problem from recurring? Again, remember this should address the whole operation.`},
{id:"ADM-008",w:1,text:`When applicable the following items are retained in the 30-Day paperwork file and the Cover Sheet FedEx M-3630 is marked correctly:
1. Bulk Control Slips with regulatory fields and, if used, optional fields properly completed using either a ULD Asset number, baggage cart number, or identified as loose load.
2. AutoSlips annotated "No Package Data" are filed with a copy of the CONS DISPLAY screen or CONS EXPLORER report (keyword: CONS EXPLORER or CONS REPORTS). These reports indicate the employee numbers of individuals involved in scanning and loading the ULD.
3. Flight Dispatch Report (FDR) with transit and transload ULDs highlighted.`},
{id:"ADM-009",w:1,text:`The Load Team Reports (LTR) and Aircraft Inspection Reports located in Auto Verify Monitoring Site identify:
1. Completed tasks performed in the correct sequence and identifies the employee that completed each task.
2. Each load/offload captain performs one of the anti-tip checks.
3. An Anti-Tip Check is conducted each time the load captain selects Position Check for a compartment.`},
{id:"ADM-010",w:1,text:`Ramp location has at least one assigned Safety Risk Management Facilitator (SMRF) which:
1. Is a member of management or a salaried employee
2. Is listed in AIR
3. Facilitates the SRM event
4. Presents outputs (documentation) to appropriate levels of management for risk acceptance procedures
5. Stores outputs (documentation) of the SRM event as prescribed in SRM facilitation procedures`},
{id:"ADM-011",w:1,text:`Safety Management System (SMS) outputs are communicated to FedEx Express employees through various methods including, however not limited to, bulletins and promotional activities such as posters, videos, web articles, executive messaging, digital signage, and recognition programs.`},
{id:"ADM-012",w:1,text:`FedEx employees and vendors understand the Safety Management System and procedures for submitting proposed solutions, safety improvements, reporting observed hazards, and ineffective safety controls, including awareness of the confidential safety reporting system.`},
{id:"ADM-013",w:1,text:`The station has developed and posted a current Aircraft/Ramp Emergency Action Plan (EAP) that includes details of evacuating ramp area or aircraft, and employees are familiar with the contents of the plan. The plan is signed by management annually and, if applicable, management has shared the plan with the Ground Service Provider (GSP) management.`},
{id:"ADM-014",w:1,text:`Ramps located in the United States, District of Columbia, Puerto Rico, and Guam have posted the Hazard Awareness Communication Program Notification in an area accessible to all employees and identifies the current employee responsible for the Hazard Awareness Communication Program.`},
{id:"ADM-015",w:1,text:`Current Aircraft Parking Plan is prominently displayed in the station/ramp office, which is signed by local ramp management or stamped "SIGNATURE ON FILE" by Airport Affairs, Operations and Planning. Domestic Parking Plans can be reviewed at the RHE SharePoint.`},
{id:"ADM-016",w:1,text:`During air side activities, the ramp manager or designee responsible for the safety of personnel, ramp/aircraft security, and staging/safety of all ground support equipment is onsite. During ground operations the ramp manager's decisions on personnel, equipment, and aircraft safety supersede those of other station management.`},
{id:"ADM-017",w:1,text:`Quality Assurance Bulletins (QAB), Weight & Balance Quality Assurance Bulletins (WB QAB) and Dangerous Goods News (DG News) sites are reviewed regularly, and applicable information is shared with employees and vendors. These notifications ensure that personnel maintain an awareness of SMS, safety-critical information, and information relevant to conducted operations, including external service providers.`},
{id:"ADM-018",w:1,text:`Ramp senior manager or manager has developed, updated monthly (or as applicable), and made available to employees in the form of a Word Document, website posting or other means the Ramp Operating Plan (ROP), which includes proper ramp operations planning, adequately staffed, properly equipped requirements, any station specific requirements (i.e. ULD storage, ULD security seals) and the current approved Aircraft Parking Plan. At stations where local or country regulations prohibit storage of damaged ULDs on airport property or that utilize ULD security seals the details of these processes are included in the ROP.`},
{id:"ADM-019",w:1,text:`Stations that utilize Ground Service Providers (GSP) / vendors in their operation retain a copy of the Ramp Vendor Selection Completion Form M-8328 for a minimum of 36 months.`},
{id:"ADM-020",w:1,text:`The corrective actions submitted in response to the previous AOD Audit are completely implemented.`},
{id:"ADM-021",w:1,text:`There are no repeat findings from the previous AOD Audit identified during this audit.
Note: repeat findings identified during the current audit are listed in the applicable checklist question.`},
{id:"ADM-022",w:1,text:`Other Administrative procedures observed during this audit were within the guidelines of FedEx Policy.`}
]},
{id:"trn",code:"SECTION 2.0",title:"Training",items:[
{id:"TRN-001",w:5,text:`Ramp/station employees and managers of employees that perform ULD system safety checks, load ULDs intended for transport on aircraft, load aircraft bulk compartments, perform load captain task or conduct scale inspections have completed the applicable training below or vendor equivalent within the previous 36 months.

CULDLOD/CULDLDP — ULD Inspection and Loading and System Safety Checks
CULDWGH/CULDWGP — Scale Operation and Inspection System Safety Checks
CAE154/CAE154P plus CTSTACK — Ramp Safety, Closeout/Auto Slip Completion, ULD Inspection, and Loading System Safety Checks and Scale Ops/Checks
CTSTACK — ULD Loading
CFT100/CFT100P — Pallet Building and System Safety Checks
CLCAPTC/CLCAPTP — Load Captain (U.S. and Canada Only)
CRSO/P — Ramp Safety Orientation

NOTE: Vendors must be appropriately trained for ULD buildup or under direct supervision of a trained and currently qualified FedEx employee.`},
{id:"TRN-002",w:5,text:`Employees and managers of employees who perform aircraft interface functions such as guide person, visual warning barrier installation/removal/stowage, open/close compartment doors, load captain, directing equipment to equipment and equipment to or from an aircraft, E-stop operator procedures and CLS control panel operation or any other aircraft interface have completed Ramp Basics CAE154/CAE154P or CRSO/P and the applicable Aircraft Ground Support training and pre-requisite Air Essentials - Ground Support CAEGS/P or vendor equivalent within the previous 36 months.

Airbus - C300HGS/C300GRC
B757 - C757GS/C757GSP
B767 - C767GS/C767GSP
B777 - C777GS/C777GSP
MDD - CAF140/CRC140P

NOTE: Air Essentials Ground Support (CAEGS) is required as a prerequisite for all aircraft ground support courses beginning May 1, 2025. Any employee trained in Aircraft Ground Support prior to May 1, 2025, has been issued equivalent credit for CAEGS and is not required to attend initial training for this course.`},
{id:"TRN-003",w:5,text:`Employees who open/close aircraft compartment doors, crew doors and panels have completed the training below or vendor equivalent within the previous 36 months.
CTFOA - TFOA
CCRWDR - Crew Door`},
{id:"TRN-004",w:5,text:`Employees and managers of employees who perform tasks requiring weight & balance qualification have completed the applicable training below within the previous 36 months.
Airbus - C300HWB/C300WBP
B757 - C757W/C757WP
B767 - C767W/C767WP
B777 - C777W/C777WP
MDD - CAF139/CRP002P`},
{id:"TRN-005",w:5,text:`Employees and managers of employees who accept/inspect DG, complete AutoDG WB/SMART DG paperwork or present DG loads have completed the applicable training below or vendor equivalent within the previous 12 months.
CAE101/CDGSR — DG Specialist U.S. (Employees/Mgrs)
CAEINTL/CDGSR — DG Specialist Int'l (Employees/Mgrs)
CAEINTT/CDGSR — DG Specialist Int'l TNT (Employees/Mgrs)
CDGVEND/CDGSR — DG Specialist Int'l Vendors
CDGSMGR/CDGSMGR — DG Operations Mgrs U.S.
CDGMGRI/CDGMGRI — DG Operations Mgrs Int'l
CDGPM1/CDGPM1P — DG Processor U.S. and Non-U.S. (Employees and Mgrs)
CWBDGT/CSMTDGR — SmartDG (DG Specialists)
CADGIDT — Automated DG ID Tag (DG Specialist and Managers) 1-time`},
{id:"TRN-006",w:5,text:`DG specialists and managers of employees that build and close an ADG ULD, sign and present the Aircraft Manifest, connect the halon hose to the DG container on the aircraft, sign the Container Closeout Slip on an ADG container loaded by block, brief the crew (including ensuring proper DG class segregation, package load orientation, cargo is free of odors) or correct any net tie-down issues have within the previous 12 months completed:

DG ULD Load Tiedown and Fire Precaution Course CDGTDHH or CDGTDHF (French) or CDGTDHG (German) or CDGTDHR, or
DG Processing Methods Course CDGPM1 or CDGPM1P.`},
{id:"TRN-007",w:5,text:`Package handling employees and their managers have completed the applicable DG Awareness training below or vendor equivalent within the previous 12 months and within 30 days of taking the position requiring the training.

CDGHCBT/CDGHR1P (U.S.)
CINTDGH (Int'l) / CUKEDGA (Int'l TNT)
CDGHINT/CDGHR1P (APAC)`},
{id:"TRN-008",w:5,text:`Package handling employees, their managers and senior managers at U.S. or U.S. Territory locations have completed Hazard Awareness Training (CHAPCBT) or vendor equivalent within the previous 12 months.`},
{id:"TRN-009",w:5,text:`Package handling employees and their managers have completed DG In-Depth Security Training (CDGST1) or vendor equivalent within the previous 24 months.`},
{id:"TRN-010",w:5,text:`All employees, temporary employees, authorized representatives, and vendors except those located in the EU, UK or EFTA that interface with packages moving to/from the U.S. have completed the Security Awareness training CGSATJ (U.S. and U.S. Territories) or CCSATT (Non-U.S.) within the previous 12 months.`},
{id:"TRN-011",w:5,text:`All ramp agents, managers of ramp agents, persons in leadership positions, and designated persons tasked with aircraft handling on flights to, from, and within the U.S. and any person performing aircraft compartment searches have completed the Ground Security Coordinator Training CGSCJBX (All, except German) or CGSCJOB (German) within the previous 12 Months.`},
{id:"TRN-012",w:5,text:`Employees performing Aircraft Marshalling or Wing-walking functions have completed the applicable training or vendor equivalent within the previous 36 months.
CMARSH/CMARSHP (Aircraft Marshalling)
CWNGWK/CWNGWKP (Aircraft Wing-walking)

Note: International ramps where the local Civil Aviation Authority/CAA regulates marshalling of aircraft using ICAO signals, the certification of the marshaller is the responsibility of the CAA. All CAA certifications satisfy the CMARSH training requirement and CMARSH training code is not required to be itemized in the vendor equivalency letter.`},
{id:"TRN-013",w:5,text:`Employees that support pushback and tow operations by inspecting, connecting or disconnecting the tow bar have completed the following training or vendor equivalent within the previous 36 months:
M910454/M91454P — A300 Towbar
M910472/M91472P — MD11 Towbar
M910508/M91508P — B757 Towbar
M910626/M91626P — B767 Towbar
M910547/M91547P — B777 Towbar
Note: Non-AMT personnel who have successfully completed pushback and tow training are tow bar qualified for the applicable aircraft type.`},
{id:"TRN-014",w:5,text:`Non-AMT employees that perform Pushback and Tow operations have completed the applicable training or vendor equivalent within the listed frequency:
M910253/M91253P — Non-AMT Tow Tractor — 36 Months
M910554/M91554P — Non-AMT Towless Tractor — 36 Months
M910309/M91309P — A300/310 Pushback and Tow — 12 Months
M910463/M91463P — B757 Push Back and Tow — 12 Months
M910572/M91572P — B767 Pushback and Tow — 12 Months
M910523/M91523P — B777 Pushback and Tow — 12 Months
M910255/M91255P — MD10/MD11 Pushback and Tow — 12 Months`},
{id:"TRN-015",w:5,text:`Employees that install/remove the tether, inspect the tether/hardware/weight cart, position the weight cart, or perform the task of guide person for the weight cart have completed the applicable training or vendor equivalent within the previous 36 months:
M910394 — Aircraft Tethering — 36 Months
M910575/M91575P — Weight Cart Positioning — 36 Months
CWCTEU — EU Weight Cart Positioning — 36 Months`},
{id:"TRN-016",w:5,text:`Employees performing specialized tasks, such as the below, have completed the applicable training or vendor equivalent within the applicable frequency:
M910236 — Fuel Service Form — 36 Months
M910514/M91514P — Ground Power Unit (GPU) — 36 Months
CSCANIT/CSCRNIT/CSRCBT — U.S. Bound Cargo Screening — 12 Months`},
{id:"TRN-017",w:5,text:`Employees, including GSP vendors, that perform tasks at the aircraft or in-scope warehouse tasks such as aircraft cleaning, loading, GSE operation, ULD service checks, closeout, weighing and preparation of dangerous goods for air freight have completed M910571 SMS Basics Training or approved equivalent within the previous 36 months.`},
{id:"TRN-018",w:5,text:`Employees who facilitate SRA events have completed one of the following courses in the previous 36 months:
M910663 or M910590 Safety Risk Management for Facilitators`},
{id:"TRN-019",w:5,text:`All Air Operations, Global Ramp Operations Air Operations, Global Ramp Operations, Global Operations Control, and Dangerous Goods Administration management up to the VP level have completed M910679 Risk Acceptance for Management Training (No Recurrency).`},
{id:"TRN-020",w:5,text:`Employees and managers of employees who operate motorized Ground Support Equipment (GSE) have completed the below applicable training or vendor equivalent within the previous 36 months.
1. CBELT1/P — Drivable belt loader
2. CBELT5/P — Walk behind beltloader
3. CTUGC3/P — Small capacity tug
4. CTUGC5/P — Large capacity tug
5. CDR30/P — Commander 15 & 30 cargo loaders
6. CSORTP/P — Portable Container Sort Platform (WASP)
[TEXT PENDING — this equipment list continues on a page not yet photographed. Snap that page and it can be patched in.]`},
{id:"TRN-021",w:5,text:`FedEx and GSP employees successfully complete testing or evaluation by written, oral or practical means and demonstration of knowledge, competency, and proficiency for training courses. Completed tests and competency checklists are retained. (Refer to Table 2-20-5-2 for recurrent testing protocol.)`},
{id:"TRN-022",w:5,text:`Other Training requirements observed during this audit were within the guidelines of FedEx Policy.`}
]},
{id:"gsp",code:"SECTION 3.0",title:"GSP / Vendor Support",items:[
{id:"GSP-001",w:3,text:`Ground Service Provider (GSP)/vendor training documentation is available and current for employees that interface with packages or aircraft.`},
{id:"GSP-002",w:3,text:`The Ramp retains a copy of the current Regional Learning and Development Vendor Equivalency Training Approval Letter. The operation conforms with the approval letter and the completed Vendor Ramp Training Assessment Checklist.
NOTE: The auditor should request a copy of the Ramp's Vendor Ramp Training Assessment Checklist from the applicable Regional Learning & Development Department prior to the station audit.`},
{id:"GSP-003",w:3,text:`The Regional Learning and Development Vendor Equivalency Training Approval Letter contains:
1. Effective dates aligning with the duration of the contract.
2. Specific FedEx Express course titles and course code correlation of all training courses determined to be equivalent.
3. Recurrent frequency for both the FedEx Express training course and its equivalent vendor course. These recurrent frequencies must match to be equivalent courses.
4. List of FedEx locations the vendor is authorized to service.
5. A statement indicating the vendor must provide the local ramp management copies of training records and rosters on a quarterly basis or when requested, which contain the activities and outcome of their initial and recurrent training, date of the training, specific training courses conducted and the name of the instructor.`},
{id:"GSP-004",w:3,text:`The vendor retains copies of test and competency checklists completed by employees for all training contained in the Regional Learning and Development Vendor Equivalency Training Approval Letter.`},
{id:"GSP-005",w:3,text:`Vendor employees that perform tasks at the aircraft or in the Sort operation, such as aircraft cleaning, loading, GSE operation, ULD service checks, closeout, and weighing have completed SMS Basics Training by one of the methods below within the previous 36 months:
1. Vendors who have FedEx IDs complete SMS Basics Course M910571 in FedEx Learning Center (FLC).
2. Vendors without FedEx IDs — FedEx or vendor company manager communicates information contained in paragraphs 1 through 5 of appendix 99-15 of the SMS Manual in one of these ways:
- Verbally with the individual vendor employees.
- FedEx representative distributes a printed or electronic copy of 99-15 Appendix D, paragraphs sections 1-5 to vendor company management or vendor trainer for them to share with their employees. The transfer of this training material from FedEx to vendor must be documented.
- The course M910571 SMS - The Basics can be accessed and viewed through Adobe Connect / vendor access.
Note: The vendor representative delivering the training in any of the above specified methods must document the date, time, and location of the meeting, including the names of the vendor employees present. (See sample roster suitable for recording training M-3696A).`},
{id:"GSP-006",w:3,text:`Other Ground Service Provider / vendor support procedures, requirements and training observed during this audit were within the guidelines of FedEx policy.`}
]},
{id:"ws",code:"SECTION 4.0",title:"Weighing Scales",items:[
{id:"WS-001",w:5,text:`Scales are functioning properly or a visible notification stating "SCALE INOP - DO NOT USE" is taped over the scale readout display and the problem is described in the "Remarks" field of the Daily Scale Inspection Form (FedEx M-1268).`},
{id:"WS-002",w:5,text:`FedEx weight and balance scales are calibrated at least once every six months. Scale calibration is completed no later than the last day of the sixth month following the previous calibration date. At International stations where local or country regulations prohibit scale calibration at least once every six months, scales are calibrated in accordance with local or country regulations.`},
{id:"WS-003",w:5,text:`The current calibration record is maintained on file at the station, and the previous scale calibration is maintained on file for a minimum of 30 days after the current calibration record is filed.`},
{id:"WS-004",w:5,text:`Only one FedEx calibration sticker (or two stickers for scale decks with dual readouts) or an equivalent sticker annotated with the most recent calibration/validation date is affixed to each FedEx Express or vendor owned scale.`},
{id:"WS-005",w:5,text:`EPN is visible on the scale readout.`},
{id:"WS-006",w:5,text:`Once during a 24-hour period when weighing activity will take place, a daily pre-trip inspection of all scale types used to weigh cargo intended for aircraft transportation is completed using a dolly, ULD or certified weight and documented on the Daily Scale Inspection Form (FedEx M-1268). If a certified weight is used it must be a minimum of 12.5% of the scale capacity.`},
{id:"WS-007",w:5,text:`Completed Daily Scale Inspection forms are retained for 30 days in either one file labeled Daily Scale Inspection Forms or in each Outbound Flight Form Retention Envelope with Outbound Flight Paperwork Cover Sheet.
Note: Only Hubs may use both file retention methods in the same location.`},
{id:"WS-008",w:5,text:`Other weighing scale procedures observed during this audit were within the guidelines of FedEx Policy.`}
]},
{id:"uld",code:"SECTION 5.0",title:"ULD Storage / Staging Areas",items:[
{id:"ULD-001",w:3,text:`The ramp has a designated damaged ULD area that is clearly identifiable by ramp personnel and sufficient separation from serviceable lots to prevent mixing ULDs. At locations where local or country regulations prohibit storage of damaged ULDs on airport property or prohibit the use of signs to indicate serviceable or non-serviceable when ULDs are stored in an international common use ramp space these policies do not have to be complied with, however management must outline in their local operating plan how they manage nonserviceable ULDs to prevent inadvertent use.`},
{id:"ULD-002",w:3,text:`ULDs are stored on racks, dollies, timbers, or wooden skids and the base is never allowed to contact the ground or concrete.`},
{id:"ULD-003",w:3,text:`ULD doors and curtains are properly installed and closed when stored or staged outside.`},
{id:"ULD-004",w:3,text:`Serviceable (SV) and non-serviceable (NU/TO) ULDs are not mixed in the same storage lot.`},
{id:"ULD-005",w:3,text:`Red Damaged ULD Placard (FedEx M-8262) is applied near the asset number of containers with door pouches, on the flat inboard (door) side of LD3s or top base near a corner of the pallets to identify damaged ULDs, and a damage report is entered in the ULD system, downgrading the ULD from SV condition.`},
{id:"ULD-006",w:3,text:`Other ULD storage and staging requirements and procedures observed during this audit were within the guidelines of FedEx policy.`}
]},
{id:"dg",code:"SECTION 6.0",title:"Dangerous Goods / Sort Operations",items:[
{id:"DG-001",w:5,text:`FedEx locations with customer access (any location that accepts any freight at all) display the applicable dangerous goods warning signage listed below.
1. United States: locations display the versions of the FedEx DG Warning Sign specified in DGM Table 99-0-2.
2. Non-US locations display one of the two following options:
a. A current version of the "Have You Declared It" Poster published by IATA and available for purchase directly at the IATA website store.
b. The version of the FedEx DG Warning Sign as specified in Table 99-0-2, which may be translated into a local language as necessary.`},
{id:"DG-002",w:5,text:`A copy of the Aircraft DG Manifest, signed by the PIC and the responsible DG Specialist (ADG Onboard) is retained for a minimum of 90 days, either in a file at the Ramp or scanned into the DG Administration Dashboard.`},
{id:"DG-003",w:5,text:`Shipper's Declaration Form or a 390CR (U.S. domestic shipments only) are retained in a 13-month file. Stations located in Canada, China, and Germany retain DG Paperwork for 24 months.`},
{id:"DG-004",w:5,text:`Manually completed DG Acceptance Checklists for accepted DG are retained in a 4-month file (3 calendar months and current month). Manually completed checklist and Shipper's Declaration for rejected DG are retained in a 30-day rolling file.
NOTE: Locations using SMARTDG checklist (accepted and rejected) are not required to maintain hard copy checklist due to electronic retention.`},
{id:"DG-005",w:5,text:`Prior to a DG package being loaded into a ULD, a DG Specialist completes a current FedEx Dangerous Goods Acceptance Checklist or uses Smart DG software to document acceptance inspections and verifies:
1. DG packages have either a legible Dangerous Goods Inspection Sticker, FedEx M-1558 Dangerous Goods Inspection Sticker template or DG Inspection stamp affixed to the package before it is placed in the appropriate ULD. (Dangerous Goods Inspection Sticker template is available at the DG Website.)
2. Shipper's declaration forms, package markings, and labels are in English and in addition in the language required by the State of Origin.
3. Packages are properly identified, packaged, marked, and labeled. Packages that have already been accepted into the FedEx system and have a DG specialist inspection sticker discovered anywhere in the system with IATA labels that have become lost, detached, or illegible are replaced by a DG specialist in accordance with the information provided on the Shipper's Declaration.
4. Airbill, labels, stickers or pouches do not obscure dangerous goods markings and labels.`},
{id:"DG-006",w:5,text:`Prior to scanning and physically loading DG shipments into a ULD/BULK, each package is compared against the Sort Manifest to confirm that the DG package tracking number and the DG information matches the Sort Manifest before:
1. Marking the package tracking number on the Sort Manifest.
2. Scanning the package to the ULD / BULK CONS and physically loading it, observing applicable segregation, orientation, and blocking / bracing requirements.`},
{id:"DG-007",w:5,text:`Packages identified with leaks, odorous or damage — the following is followed:
1. Not accepted into the system.
2. Not to be loaded in ULDs or on an aircraft.
3. Isolated and reported immediately.
4. Any ULD with residue or odor from a spill is not loaded on an aircraft and completely cleaned or the freight is transferred to a clean ULD.
5. Spill report is completed.`},
{id:"DG-008",w:5,text:`Incompatibles are segregated by 3 feet in holding areas, staging, build-up, baggage carts, aircraft, and ground vehicles. Hubs and major sort locations that utilize a centralized DG sorting process are not required to maintain segregation of incompatible packages while being sorted or temporarily staged for prior to being loaded into a ULD.`},
{id:"DG-009",w:5,text:`Dangerous Goods are placed in a designated DG staging area which is located:
1. In the warehouse area and not in the offices near the staff or near customer areas.
2. Out of view from the entrance of the facility or customers.
3. Away from other freight (specifically food) that may become contaminated in the event of spillage or leakage.
4. Away from open drains.
5. Away from vehicle traffic.
6. With a fire extinguisher located within 50 feet traveling distance, which is defined as the actual path you would walk to the fire extinguisher.`},
{id:"DG-010",w:5,text:`Prior to loading packages into ULD: any snow, ice, water, garbage, old Closeout Slips / AutoSlips and DG ID Tags are removed and System Safety Check #1 completed.`},
{id:"DG-011",w:5,text:`Dangerous goods are properly handled, loaded, and transported.
1. All package orientation labels are in the UP position including while on sort belts, in carts, in vehicles and aircraft loading.
2. Nonrefrigerated compressed gas cylinders are stored horizontally and as close to the floor as possible, except cylinders prepared in combination packaging.
3. Accessible Dangerous Goods (ADG) are only loaded in approved, specially designed, red-topped cargo containers with an extinguisher fitting (e.g., AAX, AYX, SAX) or netted pallets used to carry.
4. Inaccessible (IDG) cargo loaded in a ULD, or belly compartment of an aircraft must be blocked and braced to prevent any movement.
5. All packages loaded in DG container/pallet whether only DG packages or a combination of DG and non-DG packages, are secured with the appropriate netting. The netting must always remain with the DG container.
6. Non-DG and IDG loaded into an ADG container/pallet is not loaded on top, or in front of any ADG and does not interfere with access to the ADG in the ULD.
7. DG packages are not loose-loaded, placed or transported on a tug, dolly or pallet or other non-package GSE transit equipment unless they are properly secured with straps or rope.
8. Packages loaded into an ADG ULD are properly secured with a net.`},
{id:"DG-012",w:5,text:`Approved and serviceable nets are used to tie down ADG. Nets used to secure ADG must:
1. Have two long sides, one with an optional strap.
2. Have one short side with four or five adjustable straps (with hooks attached).
3. Have one short side with four or five double stud fittings attached.
4. Not exceed more than two cut or torn diamonds on any side.
5. Not exceed more than two adjoining cut diamonds.
6. Not have any cut diamonds on the outside two rows of diamonds.
Note: Use of bridge straps on damaged nets makes the net serviceable and extends the life of the net until it is necessary to send the damaged net assembly in for repair. A maximum of 8 bridge strap assemblies may be used on a damaged net, with no more than 2 per side and 2 adjacent to each other. If damage exceeds the limits stated, the net is not serviceable and must not be used.`},
{id:"DG-013",w:5,text:`Automated DG generated DG ID Tags are inserted in a red hatch plastic envelope and displayed on the exterior of the container in the pouch, and for a pallet, it is affixed to the netting on the aisle side, as the outermost unobscured document. The flight number block on the DG ID Tag may be completed or changed by any employee. Automated DG ID tags are updated at each intermediate or transit stop when DG packages are added or removed from the ULD.`},
{id:"DG-014",w:5,text:`Proper cargo pallet net post-usage and installation methods are followed.
1. Net covers all the freight.
2. The net is properly secured to the pallet and is tightened to hold the freight in place.
3. Serviceable nets must be dried out and bagged for protection.
4. Date of manufacture has not exceeded 3 years or expiration date if annotated. Any net that does not have a manufactured or expiration date annotated is considered unserviceable.
5. Net mesh openings do not have more than two cut diamonds on any side, more than two adjoining cut diamonds and no cut diamonds on the bottom two rows.`},
{id:"DG-015",w:5,text:`Sort area has a serviceable 4-A:80-B:C fire extinguisher positioned within 50 feet travel distance of any given point. When there is a difference between country, state, city, or airport requirements and FedEx policy regarding minimum recommended/required fire extinguisher requirements (e.g., type, size, capacity, etc.), the ramp uses the more restrictive guidelines (e.g., higher capabilities/requirements) to ensure both regional and FedEx policies are satisfied.`},
{id:"DG-016",w:5,text:`Other Dangerous Goods and Sort Operations requirements and procedures observed during this audit were within the guidelines of FedEx policy.`}
]},
{id:"ppe",code:"SECTION 7.0",title:"Personal Protective Equipment / Safety",items:[
{id:"PPE-001",w:5,text:`Employees and management correctly utilize required PPE, such as hearing protection, reflective vest and safety shoes, while executing their job assignments, within the AOA and sort areas.`},
{id:"PPE-002",w:5,text:`Marshallers and wingwalkers wear reflective safety upper body outerwear.`},
{id:"PPE-003",w:5,text:`Employees utilize seat belts in all ground support equipment and forklifts equipped with seat belts and possess a valid driver's license.`},
{id:"PPE-004",w:5,text:`Employees do not sit or rest in the open doorways of any aircraft.`},
{id:"PPE-005",w:5,text:`Other Personal Protective Equipment and Safety requirements and procedures observed during this audit were within the guidelines of FedEx policy.`}
]},
{id:"abibo",code:"SECTION 8.0",title:"Aircraft Block In / Block Out",items:[
{id:"ABIBO-001",w:3,text:`Prior to the arrival or departure of aircraft, ramp areas are clear of all trash, debris, FOD, any objects or contamination that could be hazardous to aircraft movement, damage the aircraft or be moved by the jet blast.`},
{id:"ABIBO-002",w:3,text:`Personnel NOT involved in aircraft chocking or marshalling remain outside the silhouette until the beacon is turned off, engines shut down and brakes have been verified set.`},
{id:"ABIBO-003",w:3,text:`Ground Support Equipment (GSE) remains outside the silhouette during block-in and block-out operations.`},
{id:"ABIBO-004",w:3,text:`Parking Aid System is operational or an AMT / ramp personnel current in CMARSH must be positioned near the nose of the aircraft at the silhouette line to signal the marshaller when the nose wheel is on the appropriate parking line.`},
{id:"ABIBO-005",w:3,text:`Marshaller and wing-walkers use wands or paddles to properly execute correct hand signals. Wing walkers position themselves in view of each wingtip and the marshaller maintaining a direct line of sight. A minimum of one wing walker is required to clear the aircraft back onto the taxiway or ramp during push-back and must remain in view of the push-back operator.`},
{id:"ABIBO-006",w:3,text:`During normal chock installation, chocks are positioned two to three inches from the front and rear of the Main Landing Gear (MLG) tires. During high winds or severe weather all tires are chocked.
Note: At HKG and SGN chocks are installed on the nose and main landing gear wheels after block-in and the nose gear wheel chocks are removed after the captain acknowledges the brakes are released.`},
{id:"ABIBO-007",w:3,text:`Aircraft safety cones are correctly positioned as listed.
1. One cone each, positioned 3 feet out from the tip of both wings, except at IND/MEM Hubs where an orange cone is placed under each wing's outboard flap fairing and for 777 aircraft, which positions safety cones:
a. One cone positioned under the first outboard flap fairing of the left wing to serve as a main cargo loader mating cone. Once the main cargo loader is mated, move the cone under the second outboard flap fairing aft of the No. 1 engine (main cargo door side of aircraft).
b. One cone positioned under the first outboard flap fairing (aft lower compartment door side of aircraft).
2. One cone positioned 3 feet in front of the aircraft nose. This cone is not required at Hubs and when:
a. The aircraft is connected to an aircraft tow tractor via towbar or towbarless tractor
b. A tug is positioned 3 ft in front of the aircraft
c. Connected to a weight cart
3. One cone positioned 3 feet from the tail of the aircraft, except at Hubs.
4. One cone each, positioned 3 feet in front of both wing-mounted engines on all aircraft.
5. One cone each, positioned 3 feet to the outboard side of wing mounted engines for all aircraft.
6. When an aft belly transition deck is NOT used for a B767, a cone is placed beneath the forward edge of the right wing, aligned with the middle fairing.`},
{id:"ABIBO-008",w:3,text:`Push-back tug and tow bar are not connected to the aircraft during on-load, offload or refueling operation.`},
{id:"ABIBO-009",w:3,text:`The headset cord is connected from the aircraft to the push-back tug and does not drag the ground or become entangled in the aircraft's nose wheel and tow bar during aircraft pushback.`},
{id:"ABIBO-010",w:3,text:`Personnel riding on a tug are seated in a permanently mounted seat within view of the tug operator during aircraft push-back and remained seated until the tug comes to a complete stop.`},
{id:"ABIBO-011",w:3,text:`Personnel do not walk beside the aircraft while it is moving with a headset connected directly to the aircraft. Exceptions to this are when there is a language difference between the pushback, tow tug operator and cockpit crew or if a vendor's policy/procedures prohibit this action when providing push-back service for FedEx Express. In these situations (only while the aircraft is moving), the language coordinator / vendor can be seated on an approved tug seat or the language coordinator/vendor may walk beside the aircraft but must remain further than 10 feet from the aircraft and tug.`},
{id:"ABIBO-012",w:3,text:`During aircraft pushback, a qualified person follows FedEx M-3675B ensuring positive control of the aircraft performs proper pushback procedures are conducted correctly.
1. The tug and towbar or towbarless tractor are appropriate for the pushback operation.
2. Verifies all doors and access panels are closed.
3. Disconnect power cable, and close access door if APU is not used.
4. Maximum turn radius is not exceeded.
5. Disconnect towbar from tug first.
6. Disconnect towbar from aircraft.
7. Reconnect towbar to tug.
8. Disconnect the headset.
9. The main/nose gear ground lock pins (if installed), and the nose gear steering bypass pin are removed.
10. Once clear of the aircraft, standby in plain view of the crew.
11. Vertically holds the bypass pin in left hand and dispatch aircraft with wand in right hand.
12. The direction the aircraft is to taxi or the direction to the follow-on marshaller is pointed out.`},
{id:"ABIBO-013",w:3,text:`Other Aircraft Block-In / Block-out requirements and procedures observed during this audit were within the guidelines of FedEx policy.`}
]},
{id:"teth",code:"SECTION 9.0",title:"Aircraft Tether Installation / Serviceability",items:[
{id:"TETH-001",w:5,text:`Each Domestic Station posts their Gate/Fleet tether requirements in a conspicuous location. Unless prohibited by Airport Local Authority, tether length is stenciled adjacent to the Fleet Identifier box.`},
{id:"TETH-002",w:5,text:`Tether anchor pits are free of water, oil, and any sediments to a level that allows the shackle, hook, and associated hardware to be visually inspected and confirmed serviceable prior to aircraft arrival. Stainless steel lynch pin or bolt/nut combo is installed in hook retaining bolt.
NOTE: Cotter pins are not an approved safety pin.`},
{id:"TETH-003",w:5,text:`Only approved anchor and tether configurations A through K are used for all FedEx aircraft.`},
{id:"TETH-004",w:5,text:`Prior to use, tether straps are inspected and confirmed serviceable by a qualified person that has completed M910394.`},
{id:"TETH-005",w:5,text:`A qualified individual correctly installs the proper tether to an approved tether anchor, weight cart, or tug anytime an aircraft blocks-in for any reason. When a serviceable tether, weight cart or anchors are not available or when tethering to a tug the contingency of sequential loading/off-loading may be temporarily utilized, however prior to implementation of sequential loading/off-loading the Ramp management must determine that the issue is beyond their control, have a plan in place to resolve the situation as soon as possible and enter an approved Safety Risk Assessment in SafetyNet, that includes Director of Maintenance Office, Global Network Design and Engineering, and Air Ops Ground Safety representation.

NOTE: 757/767/777 may not be tethered to a tug.`},
{id:"TETH-006",w:5,text:`Aircraft is stopped and tethered plus/minus six inches of Center Line of stop bar.`},
{id:"TETH-007",w:5,text:`When an aircraft is tethered to a weight cart:
1. The weight cart is positioned to prevent contact with the nose gear and tires.
2. When installed on a 767/777 aircraft, the weight cart is positioned 28 inches +/- 6 inches between the center of the trailer tether attachment fittings and the center of the nose wheel axle.
3. Pushback or cargo tractor used to position the weight cart minimum weight is 12,125 lbs. or 5500 kg.
4. Weight cart rear wheel brakes are engaged or weight carts not equipped with brakes are chocked while in use and staged.
5. Weight cart is not mated to the aircraft if casters (wheels) are damaged and will not track straight.`},
{id:"TETH-008",w:5,text:`When positioning or removing the weight cart a guide person is correctly positioned on the "ground power cable side" of the nose gear at the aircraft, uses correct hand signals and a brake check is conducted.`},
{id:"TETH-009",w:5,text:`Other Aircraft Tethering requirements and procedures observed during this audit were within the guidelines of FedEx policy.`}
]},
{id:"rops",code:"SECTION 10.0",title:"Ramp Operations",items:[
{id:"ROPS-001",w:5,text:`A serviceable 320-B:C Ansul 125/150lb (Domestic) or 125lb 57kg 80 B:C (International) wheeled unit fire extinguisher is positioned within 50 feet of the aircraft nose.`},
{id:"ROPS-002",w:5,text:`The Aircraft Pre/Post-Trip Damage Checks are properly performed, and a qualified employee ensures:
1. Prior to offload activities and before any GSE is mated to the aircraft an exterior pre-check is completed.
2. Once offload is complete a Post Trip Check of all compartments is completed.
3. Prior to loading activities an exterior and compartment Pre-Trip Checks are completed.
4. After loading is complete, an exterior post-check is performed prior to aircraft block out.
5. All FOD, garbage, and debris is removed from ULD channels and aircraft.
6. Any damage identified during any stage of the Pre/Post Checks is reported to Aircraft Maintenance and Ramp management.
7. A flashlight is used at twilight or night when light is not adequate.`},
{id:"ROPS-003",w:5,text:`Aircraft Ground Support qualified employee ensures smoke barrier and 9G nets are in good condition, operable, and locks / lock bars are not missing or inoperative before aircraft loading starts. Reports any discrepancies or problems with the load system or smoke barrier/9G net to the ramp manager and aircraft maintenance immediately.`},
{id:"ROPS-004",w:5,text:`Crew doors are not opened unless crew stairs are positioned at the door opening or the door visual warning barrier net is correctly installed.`},
{id:"ROPS-005",w:5,text:`Prior to mating crew stairs an Aircraft Ground Support-trained employee ensures the crew doors are disarmed and if equipped with a security cage ensures the door is unlocked and open. The cage door remains unlocked and opened on crew stairs equipped with a security cage during the removal process until placed in the staging area.`},
{id:"ROPS-006",w:5,text:`Crew stairs are positioned between the aircraft's vertical stripes, approximately 2 to 4 inches from the fuselage with a maximum step up of 8 inches, and if removed either the crew entry door net is installed or the crew entry door closed. During placement and removal of crew stairs, when connected to a cargo tractor or in motion, no personnel are on the stairs.`},
{id:"ROPS-007",w:5,text:`Prior to pushback crew stairs are removed from the aircraft and staged with the security cage (if equipped) closed but not locked, unless the security cage is equipped with a Bluetooth Master lock then it is locked.`},
{id:"ROPS-008",w:5,text:`Crew doors are completely open or closed during normal offload or load operations. MDD aircraft crew door(s) may be opened to 8 inches (13 inches to access the MCD control panel) without the crew entry door visual warning barrier installed when the crew stairs are not mated below.`},
{id:"ROPS-009",w:5,text:`During periods of any type of precipitation, regardless of its intensity, each person entering or leaving the aircraft via a crew door ensures the door is completely closed after passing through it. ULDs, platforms, ladders, crew stairs, and steps are free of ice, snow, and water before any equipment is put in service or placed on an aircraft.`},
{id:"ROPS-010",w:5,text:`Anti-tipping compliance is checked by each Load Captain and properly documented. The anti-tip is rechecked if:
1. The loading of the aircraft is interrupted/stopped AND the load captain leaves the immediate aircraft loading area and returns, or
2. The loading of the aircraft is interrupted/stopped AND a new load captain is used who is different from preceding load captain, or
3. The loading of the aircraft is NOT interrupted/stopped BUT a new load captain is used who is different from preceding load captains.`},
{id:"ROPS-011",w:5,text:`ULDs intended for transport on aircraft are properly prepared.
1. Meet the requirements contained in the ULD Condition Checklist.
2. TO status ULDs used for air shipments utilize the net kit program and the process is documented.
3. Container covers are installed on loaded containers when precipitation is occurring, loaded containers are staged outdoors when precipitation is predicted, or precipitation is predicted at the destination location. Not required for containers inbound to MEM due to MEM inclement weather.
4. Container covers are installed on all containers (except lives, perishables, active RKNs and ADG ULDs) destined for HNL, SYD, AKL and ASIA during typhoon season (May - October).
Note: A container cover is installed over the top of container, down each side of the container all the way down to the bottom of the panel. Standard packing tape is used to secure the plastic ends to the aluminum panel and shrink-wrap around the bottom of the container to a minimum of 1 foot high.
5. Door locks are operable and latched at the full closed position.`},
{id:"ROPS-012",w:5,text:`Packages are properly handled, transported, and loaded. Packages are not:
1. Thrown into carts, ULDs, or compartments, or onto conveyer belts.
2. Transported around the ramp or between aircraft on belt loaders.
3. Transported in containers with doors or curtains open.
4. Loose-loaded, or transported on a cargo tractor, dolly, pallet, or other non-package GSE, unless they can be properly secured with straps or rope.`},
{id:"ROPS-013",w:5,text:`Personnel operating GSE/vehicle sound the horn before starting vehicle movement or when changing from forward to reverse or reverse to forward gear. Drivers come to a full stop at all stop signs, pedestrian crosswalks and blind corners (whether at a building or at parked equipment), and sound the horn, before proceeding.`},
{id:"ROPS-014",w:5,text:`GSE Guide-persons remain in full view of the driver, with no line-of-sight obstructions and use only approved ICAO hand signals. Guide person is used when moving all equipment around the aircraft, except transporters operated in forward, moving away from the aircraft. Use of wands, lighted wands, or paddles when performing GSE guide person duties is required at all locations unless more restrictive or specific work standards are in place under local authority.`},
{id:"ROPS-015",w:5,text:`GSE is not parked or does not pass under any part of an aircraft unless authorized in the following published procedures.
1. On the MDD a tug and dolly/baggage cart string of four passes under the stabilizer (tail area) and/or under the trailing edge of the aircraft wing during aft lower compartment onload/offload.
2. On the Airbus a tug and dolly/baggage cart string of four passes under the stabilizer, not the fuselage, and under the trailing edge of the aircraft wing during aft lower compartment onload/offload.
3. On the B757 when opening/closing the belly compartment doors, with handrails in the full down position the belt loader's seat back is vertically aligned with the door control panel.
4. On the B777 a tug and dolly/baggage cart string of four passes under the wings.
5. On the B767 a tug and dolly/baggage cart string of four passes under the right wing.`},
{id:"ROPS-016",w:5,text:`Unoccupied cargo tugs, courier vans, CTVs, and other trucks are not left running and unoccupied belt loaders, cargo loaders, and fuel trucks are not left running unless actively attended by a qualified person. Actively attended means in very close proximity to the vehicle (approximately 25 feet) with unrestricted view of the equipment. Equipment specifically covered in the Winter Ops Plan is exempt.`},
{id:"ROPS-017",w:5,text:`Primary, secondary, and tertiary brake checks are conducted on motorized GSE. Primary brake check is performed when starting the unit and putting the transmission into gear with the brake applied. Secondary check is performed after driving the unit approximately three feet forward and the tertiary check approximately twelve feet from the aircraft.`},
{id:"ROPS-018",w:5,text:`An approved ladder is used to gain access to the lower deck forward and center (aft) cargo compartments. A ladder is not required when local operating conditions or requirements do not support the usage of a ladder (e.g., U.S. Department of Agriculture requirements to prevent insect ingress to a cargo compartment).`},
{id:"ROPS-019",w:5,text:`The main cargo door operator physically checks and ensures the Halon hoses are disconnected from the ADG containers and secured before opening the main cargo door.`},
{id:"ROPS-020",w:5,text:`When the main cargo door is open and loading or unloading is not in progress, the main deck loader is mated and level with the upper deck floor or the visual warning barrier is correctly installed across the main cargo door. If the visual warning barrier is damaged or not available on the aircraft, appropriate equipment, such as main deck cargo loader or maintenance stand is in place and level with the door sill.`},
{id:"ROPS-021",w:5,text:`Safety rails are fully retracted/lowered on aircraft loaders when opening and closing cargo doors, then immediately after mating the loader to the aircraft, safety rails are repositioned 4-6 inches from the aircraft.`},
{id:"ROPS-022",w:5,text:`Aircraft loaders are correctly positioned and configured, including the loader bridge ULD side guides, for the widest ULD planned for the compartment. When a loader is equipped with an E-Stop in addition to a guide person an E-Stop operator is in position holding the E-Stop.`},
{id:"ROPS-023",w:5,text:`Loader bridge occupants stand in the designated area opposite side from the loader operator in the middle of the handrail two ft or (61cm) on either side of its center point or between the black grip surface if applied and securely hold the handrail. Maximum of two individuals other than the loader operator allowed on the loader bridge for all aircraft, except B777, which allows four individuals in designated spots.`},
{id:"ROPS-024",w:5,text:`Personnel ascend/descend the loader ladder only with the loader bridge in the full down position and maintain 3 points of contact.`},
{id:"ROPS-025",w:5,text:`When a dolly is mated to a loader at the aircraft, personnel do not stand between the loader and dolly or handle the dolly locks/pins on the loader side, unless the elevator platform is in the full down position.
Note: Onload/Offload Control Sheets can be used as a contingence.`},
{id:"ROPS-026",w:5,text:`Auto Verify handheld devices are used by Load Captains and other employees at the aircraft performing tasks, such as security, pre/post damage and identification checks to confirm completion in the proper task sequences.`},
{id:"ROPS-027",w:5,text:`ULD Checks are executed at the aircraft by the pin person or other on-ground qualified employee confirming ULD:
1. Checks the exterior of the ULD.
2. Ensures the container door locks are operable and latched at the full closed position.
3. Visually inspects accessible ULDs that remain onboard from previous legs for serviceability.
4. Ensures pallet builds are stable and compatible with the contour of the aircraft.
5. Ensures pallet net is tight, lash cords are secure, and appropriate TSO tags attached.
6. Ensures stud locks are engaged.
7. Ensures the ULD is assigned to the flight selected in AutoVerify.
8. Ensures the correct closeout record is placed on the correct ULD.
9. Ensures the ULD weight matches the weight entered in the weight and balance.
10. Confirms the System Safety Check has been performed on the ULD.
Note: ULD with an existing ULD Check that's removed from the aircraft and placed on a ULD dolly to be reloaded on the aircraft has the existing ULD Check removed by using the REMOVE ULD CHECK option in weight and balance.`},
{id:"ROPS-028",w:5,text:`ULDs are delivered to the upper deck in the correct orientation and are only rotated in the aircraft as authorized.
1. B757/B767 - Never inside the aircraft.
2. Airbus/MDD - Up to 90 degrees within the forward/aft main deck ball mat areas.
3. 777 - No manual rotation inside aircraft, except for PAG/PMC pallets with an overhang.`},
{id:"ROPS-029",w:3,text:`Personnel move ULDs with a steady push/pull ensuring ULD remains under control and does not abruptly impact aircraft cargo locks. ULDs are not forced into position during loading/offloading and J-bars, pry bars, crowbars, hammers, or other such tools are not used to force a ULD into or out of position.`},
{id:"ROPS-030",w:5,text:`Load captain, team leader, ramp agent, ramp manager, or international equivalent uses Auto Verify handheld device to document ULDs loaded on the aircraft and confirms:
1. The ULD is loaded in the correct position on the aircraft.
2. The load position locks/nets are engaged.
3. The ULD asset bar code or AutoSlip record is scanned as the ULD is being loaded through the aircraft cargo compartment door.
4. The aircraft position bar code is scanned after the ULD is secured in its correct load position.
5. Aircraft W&B conditions are correct and within limits.
6. Aircraft loading loaded within applicable regulations and loading instructions for the flight.
7. Additional information, including last-minute changes is in agreement with the actual load on the aircraft.
8. All water/ice/snow accumulation is removed from ULDs before loading on the aircraft.
9. Aircraft and ULD locks are engaged.
Note: If the barcode is not scannable/readable, or if the aircraft is not equipped with the position barcode, then manual entries of the position scans are permissible.`},
{id:"ROPS-031",w:5,text:`A Bulk Closeout/Auto Slip is attached to the ULD or baggage cart at the aircraft. Trunk aircraft bulk compartment load is not above the bottom of the red line.`},
{id:"ROPS-032",w:5,text:`Belt loader is correctly positioned and configured when used to open/close lower cargo doors and during cargo loading or offloading, including the positioning of the tethered emergency stop control.`},
{id:"ROPS-033",w:5,text:`Lives / perishables are correctly handled, transported, and loaded, including:
1. Lives are not placed inside closed ULD, except for the purpose of short-term transport around the facility and ULD doors are opened or removed immediately upon arrival to the area.
2. Lives loaded on pallets or in the ABK are kept at least 12 inches off the aircraft floor or above the pallet base.
3. Lives have 4 inches of air space around the perimeter of stacks of boxes and not placed next to the skin of the aircraft.
4. Lives are loaded forward of dry ice or cryogenic liquid shipments and separated by one position.
5. Lives are not loaded into the same bulk compartment as DG or cryogenic liquids.
6. Lives are not covered with solid plastic tarps, except USPS provided breathable mesh tarps used to transport in rain or cold weather conditions, which are removed immediately after transportation.
7. Lives are maintained in an upright position throughout the transportation process.
8. Lives are not loaded into the lower aft compartment of a B757, and no cargo is placed on top of lives.
9. Perishables are adequately protected by proper packaging and preparation.
10. Perishables with an ADG subrisk are loaded in ADG ULD.
NOTE — Insects, non-venomous reptiles (i.e., snakes, alligators, lizards), and pet store tropical fish and consumable shellfish (i.e., lobsters, scallops, etc.) are not considered Lives for air carriage purposes.`},
{id:"ROPS-034",w:5,text:`Prior to presenting ADG ULDs and DG Manifest to the flight crew, a qualified DG Specialist:
1. Visually inspects the halon fire extinguisher pressure gauge, ensuring the pointer is within the green operable range.
2. Connects the Halon hose, unless the Aircraft Fire Suppression System (FSS) is installed and active.
3. Ensures the correct halon bottle/s are connected.
4. Ensures incompatibles are segregated, packages are secured with the net, and there are no spills or odors in the ADG ULD.
5. ADG pallets and any pallets forward of them are built with 18 in/46 cm aisles located on two adjacent sides of the pallet, except on the B767.
6. ADG pallets and any pallets forward of them on a B767 have an 18 in/46 cm walkway on the left and forward sides.
7. ADG ULD is presented to the flight crew by the same DG specialist/agent who completes and signs the Aircraft DG Summary.`},
{id:"ROPS-035",w:5,text:`Cargo hold areas on all outbound trunk aircraft are searched by a qualified Ground Security Coordinator and documented in Auto Verify. If Auto Verification System is inoperative, security checks must be documented on the Aircraft Search Inspection Checklist and filed in the Ramp Paperwork folder for a period of 30 days. An emergency telephone numbers list is carried by the Ground Security Coordinators (GSC).`},
{id:"ROPS-036",w:5,text:`After all cargo is loaded, non-flight personnel have deplaned, and cargo doors are closed, the verifying Ramp Agent or Load Captain secures the 9G net/smoke barrier by sealing the Velcro, or zippers, and engaging the quick release pins. On solid bulkhead aircraft the small solid door is secured.`},
{id:"ROPS-037",w:5,text:`Management has developed, implemented and communicated to all employees a local Pre/Post Trip Condition Plan and Checklist for all motorized ramp-assigned GSE and crew stairs.
1. The plan is included in the Ramp Operating Plan.
2. Completed Pre/Post Trip Condition Checklists are retained in hardcopy or electronic form for a minimum of seven days.
3. All discrepancies are reported to a ramp manager and unsafe equipment is taken out of service.
4. Ensure completed paperwork is retained in a rolling 7-day file system. An electronic filing system of pre and post trips is also acceptable in place of a hard copy retention system.`},
{id:"ROPS-038",w:5,text:`There was no adverse weather, or implemented procedures for adverse weather indicated below were complied with.
1. Snow/wintery mix on apron.
2. Thunderstorm or lightning.
3. High winds`},
{id:"ROPS-039",w:5,text:`GSE wheel chocks are installed per FedEx policy and local chocking plan.`},
{id:"ROPS-040",w:5,text:`Other Ramp procedures observed during this audit are within the guidelines of FedEx policy.`}
]},
{id:"fao-ack",code:"ACK",title:"Acknowledgement",items:[
{id:"FAOA-ACK-001.00",w:0,text:`I acknowledge that this CSM is intended as a guide, listing specific areas that will be sampled by FAO in determining compliance with applicable policies, procedures, and specifications. Examples and standards listed at the end of each question depict the minimum of items that will be evaluated and may not be inclusive of all applicable elements. In no way should the checklist be used or considered a substitute for existing policy and procedure.`}
]},
{id:"fao-dg",code:"DG",title:"Dangerous Goods",items:[
{id:"FAOA-DG-001.00",w:9,text:`Is all of the dangerous goods paperwork is properly completed, distributed, and retained in accordance with 3-1 of the dangerous goods manual?

1) Aircraft Summary DG Manifest. One signed hard copy presented to flight crew, one signed hard copy retained for a minimum of 90 days. Compliance must be accomplished in one of the following manners.
a.) A hard copy, signed by the PIC, filed and retained at the origin location of the flight for a minimum of 90 days.
b.) A scanned image of the hard copy, signed by the PIC, can be forwarded to the defined electronic repository maintained by DG admin "keyword: DGADMIN".
2) DG Position Summary. One copy to flight crew.
3) ULD DG Manifest(s). One copy of each ULD DG manifest to flight crew.`},
{id:"FAOA-DG-002.00",w:9,text:`Is a Workbench DG generated DG ID Tag inserted in a plastic red hatch envelope (Part #167172) and is prominently displayed on the exterior of the ULD or pallet netting?

Notes: Applicable to containerized/palletized feeder aircraft.
1) Every ULD carrying labeled dangerous goods (or materials packed in DOT special permit packaging) intended to be loaded in a ULD position on an aircraft must have an automated DG ID tag in the DG ID tag envelope displayed on the exterior of the ULD or pallet netting. The DG ID tag must be clearly visible and not obscured by other paperwork or documentation.
2) ULDs containing dry ice and other dangerous goods still require a DG ID tag, the dry ice information is not required to be listed on the DG ID tag.
3) For DG ULDs, the automated DG ID tag must be updated at each intermediate or transit stop, only if DG packages are added or removed from the container.
4) The automated DG ID tag must reflect the initial origin and final destination locations only.`},
{id:"FAOA-DG-003.00",w:5,text:`Are all dangerous goods packages properly handled, loaded, secured, and transported according to crew members direction?

1) Containerized/Palletized Aircraft: ADG ULD is presented to the flight crew by the same DG specialist/agent who completes and signs the Aircraft DG Summary. Applicable to containerized/palletized aircraft.
2) Containerized/Palletized Aircraft: ADG pallets are built with 18 in/46 cm aisles located on two adjacent sides.
3) All Aircraft: DG packages are oriented correctly (in accordance with orientation arrows) AT ALL TIMES.
4) All Aircraft: Non-refrigerated compressed gas cylinders are stored horizontally and as close to the floor as possible.
5) All Aircraft: Refrigerated gas containers are secured upright on the container/pallet/aircraft floor.
6) All Aircraft: IDG and non-dangerous goods are not loaded on top or in front of ADG.
7) All Aircraft: DG is secured with appropriate netting to prevent movement.`},
{id:"FAOA-DG-004.00",w:4,text:`Is a minimum of ONE DG Specialist present at all times for all revenue feeder aircraft activity?

Note: Non-U.S. locations that do not accept dangerous goods per the GSRG do not require dangerous goods specialist coverage.
Note: Non-U.S. locations that are approved to receive inbound dry-ice only shipments do not require DG specialist/agents but must have a DG spill cleanup specialist, or an approved vendor available that can respond to an emergency.`}
]},
{id:"fao-ff",code:"FF",title:"Flight Files",items:[
{id:"FAOA-FF-001.00",w:2,text:`Are all Feeder paperwork envelopes filed in a 30-day active file and placed in a file drawer designated as Feeder Paperwork?

Note: Files older than 30 days must be destroyed or stored as per specific country/local regulations.`},
{id:"FAOA-FF-002.00",w:4,text:`Are all Feeder paperwork envelopes completed correctly?

Feeder paperwork envelopes accurately and clearly display the following information.
1) Flight number
2) Zulu Date
3) Destination ID
4) Qualified preparer name and ID
5) Qualified Verifier name and ID
6) Remarks (if applicable)
7) Aircraft type

The envelope accurately reflects the contents with the appropriate Y, N, N/A designations.`},
{id:"FAOA-FF-003.00",w:9,text:`Are all required Feeder Flight Paperwork completed correctly and included within the Feeder Paperwork Envelope?

Note: Retention documents and forms must be current versions.

Feeder Flight Paperwork:
1) Feeder Aircraft Load Control Sheet (FedEx M-0421), or Workbench Load Control Sheet. The Load Control Sheet must not be signed until all required elements of the loading and verification process have been complete.
**Note: Signing the Feeder Aircraft Load Control Sheet indicates that the IDs of all personnel aboard the aircraft have been verified and that the aircraft is loaded in compliance with Feeder Operations Policy/Procedures, and feeder training materials, including ensuring the aircraft is empty of all non-aircrew personnel and non-aircraft/aircrew or payload equipment. Signing the Load Control Sheet without performing these tasks is considered falsification of documents and may result in disciplinary action or termination.
2) Container/ULD Closeout slips/Auto Slip (required at trunk ramps handling feeder aircraft, at international feeder locations and for all locations handling containerized feeder aircraft).
**Description: Closeout Slips are used to document a ULD asset, its condition status, employee-of-record, weight, contents, and other service-related information.
3) Bulk Control Slip / Auto Slip (required at trunk ramps handling feeder aircraft, at international feeder locations, and for all locations handling containerized feeder aircraft).
**Description: bulk freight is defined as shipments that are loaded into a conveyance such as a truck or aircraft without the benefit of a Unit Load Device (ULD). Bulk shipments are accounted for using the Bulk Control Slip.
4) Daily Scale Inspection Forms. Completed Daily Scale Inspection forms must be retained for 30 days. An operation may choose to retain the forms in one file labeled: "Daily Scale Inspection Forms," or to retain them in each Feeder Paperwork Envelope. One method must be chosen and used consistently at the location.
5) Transit Flight Paperwork. Inbound transit feeder paperwork "Load Control Sheet" must be filed with the outbound feeder paperwork in the Feeder Paperwork Envelope. Bulk Freight, removed/added at a transit stop, is weighed and the Bulk Closeout Slip(s) is completed to document the weight removed/added. The Bulk Closeout Slip(s) is filed in the outbound Feeder Paperwork Envelope.
6) Flight Release (if applicable)
7) Any other paperwork given to FedEx Express by the flight crew.`}
]},
{id:"fao-rops",code:"ROPS",title:"Ramp Operations",items:[
{id:"FAOA-ROPS-001.01",w:4,text:`Are all FedEx employees working on the ramp wearing approved reflective safety upper body outerwear, hearing protection, FedEx ID badges and if applicable airport badges. Badges must be displayed on the outside of clothes on the upper portion of the body and not concealed under clothing?

FedEx employees understand and are following the Feeder Security Plan as well as verifying that any feeder aircraft operator employee seeking access to a FedEx ramp displays a company picture ID with Security Verification Card or FedEx Vendor ID on their person.`},
{id:"FAOA-ROPS-002.00",w:2,text:`Is there a routine inspection and removal of foreign object material being conducted?
1) All ramp areas in use during aircraft operations are clean and void of any trash or FOD.
2) Trash, debris, or any other FOD is not accumulated on ground support equipment.`},
{id:"FAOA-ROPS-003.00",w:4,text:`Are all of the equipment within 50 feet of the aircraft chocked appropriately. Is the parking brake fully operational on motorized vehicle(s)/ GSE, or motorized vehicle(s)/ GSE and is chocked when the operator dismounts if the parking brake is not fully operational?

1. Single dolly/baggage cart - Set the brake and chock left front wheel.
2. More than one dolly/baggage cart connected (no tug) - Set the brake on first dolly/baggage cart and chock the left front wheel of first dolly/baggage cart.
3. Motorized GSE operator dismounts vehicle (except belt loaders) - Set the brake and turn off the engine. Chock the GSE if parking brake is not operational.
4. Cargo tractor and dolly train (operator exits vehicle) - Set the brake, put transmission in neutral, and turn off the engine. Chock the cargo tractor if parking brake is not operational.
5. Crew stairs - Chock all four (4) wheels
6. Crew stairs (with stabilizer jacks) - Engage the stabilizer jacks.
