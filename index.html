"FAOA-DG-001.00":"DG paperwork done right: signed Aircraft Summary DG Manifest - one copy to the crew, one kept 90 days (paper on file or scanned to DGADMIN). Plus a DG Position Summary and each ULD DG Manifest to the crew.",
"FAOA-DG-002.00":"Every ULD with labeled DG has an automated DG ID tag in the red hatch envelope (Part #167172), visible on the outside and not buried under other paperwork. Dry ice ULDs still need the tag. Update it at any stop where DG is added or removed. Tag shows origin and final destination only.",
"FAOA-DG-003.00":"DG handled and loaded right: same DG specialist who signs the Aircraft DG Summary presents the ADG ULD to the crew, ADG pallets have 18-inch aisles on two adjacent sides, orientation arrows UP at all times, non-refrigerated gas cylinders horizontal and low, refrigerated gas upright and secured, nothing loaded on top of or in front of ADG, and DG netted so it can't move.",
"FAOA-DG-004.00":"At least one DG Specialist is present the whole time for any revenue feeder activity. (Non-US stations that don't accept DG are exempt; dry-ice-only stations need a spill cleanup specialist or approved vendor on call instead.)",
"FAOA-FF-001.00":"Feeder paperwork envelopes go in a 30-day active file in the drawer marked Feeder Paperwork. Anything older than 30 days gets destroyed or stored per local rules.",
"FAOA-FF-002.00":"Every feeder envelope is filled out completely and legibly: flight number, Zulu date, destination ID, preparer name and ID, verifier name and ID, remarks if any, aircraft type - and the Y/N/NA boxes actually match what's inside.",
"FAOA-FF-003.00":"The envelope has all the right current-version paperwork: Load Control Sheet (never signed until loading and verification are actually done - signing early is falsification), ULD closeout slips, bulk control slips, daily scale inspection forms, inbound transit paperwork, flight release if applicable, and anything else the crew handed over.",
"FAOA-ROPS-001.01":"Everyone on the ramp is wearing the reflective vest, hearing protection, and their FedEx badge visible on their chest - not tucked under a jacket. And people are following the Feeder Security Plan, including checking that any aircraft operator employee coming onto the ramp shows a picture ID with Security Verification Card or vendor ID.",
"FAOA-ROPS-002.00":"Somebody's actually walking the ramp picking up FOD. Ramp areas in use are clean, and trash isn't piling up on the GSE.",
"FAOA-ROPS-003.00":"Everything within 50 feet of the aircraft is chocked right, and parking brakes work (chock it if the brake doesn't). The specifics: single dolly - brake plus left front wheel; dolly string - brake and chock the first one's left front; motorized GSE - brake and engine off; cargo tractor - brake, neutral, engine off; crew stairs - all four wheels (or engage the jacks); belt loaders - left rear; light units - jacks; GPU - left front (tricycle-gear GSE gets the left rear).",
"FAOA-ROPS-004.00":"Nobody leaves a vehicle running unoccupied. Exceptions: belt loaders, cargo loaders, light units, GPUs, fuel trucks, maintenance lift trucks being actively attended, chocked diesel equipment below 40 degrees F, and anything in the Winter Ops Plan. Anything left running faces away from the aircraft, in park/neutral, brake tested and set, one wheel chocked front and back.",
"FAOA-ROPS-005.00":"Qualified marshallers and wing walkers on every revenue feeder. Marshaller for start-up, entry, and exit. Wing walkers whenever clearances are tight, the crew asks, or the parking plan says so. Clearances: 10ft for C208, 20ft for C408/ATR/everything else. All of them in wands, vests, and hearing protection - and the wands are lit at night or in low visibility.",
"FAOA-ROPS-006.00":"Nobody and nothing approaches the aircraft until the props have fully stopped AND the beacon is off. Stay clear of the prop area, always.",
"FAOA-ROPS-007.01":"Cones placed right and the tail stand installed before any loading. Single engine: 3 feet off each wingtip and tail, 5 feet either side of the cargo door if a vehicle's being used. Multi-engine: 3 feet off each wingtip, nose, and tail, markers 3 feet in front of and beside the LEFT prop, 5 feet either side of cargo doors. On departure, cones stay put until all GSE is 15+ feet clear, then come off before engine start and before the beacon goes on. Layover: the operator sets a cone at the right engine - pull it before you bring equipment in.",
"FAOA-ROPS-008.00":"Distances respected: vehicles keep 3 feet off any aircraft surface (5 feet from the cargo door when loading), loaders sit 4-6 inches off the doorsill at the same height, tugs/dollies/containers stay 5 feet off the wingtips, GPUs sit at least 5 feet from the nose in the crew's view, and nothing parks or drives under the aircraft.",
"FAOA-ROPS-009.00":"ATR prop-brake procedure: once the crew says they're using it, the marshaller confirms the right main chocks and right engine cone are gone, clears everyone 50+ feet back, then signals for engine start. Everyone stays clear of the right engine. Never chock the right main or cone the right engine on a multi-engine aircraft, period.",
"FAOA-ROPS-010.01":"Nothing starts loading until equipment is mated and secured. Doors opened and secured first. Guide person and e-stop operator in position using clear hand signals. Brake check at 12 feet, bridge/belt raised to doorsill height there for final mating, lowered fully before withdrawing. Everything secured while mated: vehicles and belt loaders get brake plus chocks front and back of the driver-side rear tire, cargo loaders get brake plus stabilizers, transition decks get tongue brake plus stabilizers - and chocks come off the right way.",
"FAOA-ROPS-011.00":"Entry ladders come off before a loader mates or withdraws. Doorsill guards go on before the loader interfaces and get stowed when loading's done. Rollers stowed up before interface and during withdrawal.",
"FAOA-ROPS-012.00":"Loaders and transition decks operated right: belt loader handrail up when people walk the belt, down during cargo work; tethered e-stop sits inside the cargo compartment while loading; nobody stands on a bridge, belt, or deck while it's moving or being raised/lowered; transition decks and backup loaders get pushed into place with a front-hitch tug, never backed in; and the deck rails are set for the configuration - parallel to fuselage means end stops up and the loader-side rails down, parallel to the wing means end stops down and all rails up.",
"FAOA-ROPS-013.02":"Layover and transit aircraft: a crew member supervises loading, no preloading without one. Feeder aircraft aren't cargo storage - AM shift doesn't load for a PM departure. Doors, pods, lockers, hatches secured before departure, in bad weather, and for layover. Chocks: multi-engine arrival/departure gets left main and nose; multi-engine layover gets the right main chocked by the operator (pull it before bringing equipment in); single engine gets mains only with rubber chocks at least 4x10x4 inches.",
"FAOA-ROPS-014.00":"Containerized feeder ULDs: floor locks set for the ULD type before loading starts, two handlers moving ULDs from the deck onto the bridge (non-powered bridges get a ULD stop in the aft slot so nothing rolls back), employees reach the bridge via the platform, doorsill latches raised once ULDs are across, and every ULD locked in by the floor locks at its forward and aft ends.",
"FAOA-TRAIN-001.00":"Everyone loading or offloading feeder aircraft - and their managers - has the Feeder Handling course (CAF137) plus the recurrent test (CAF137P) within the last 36 months.",
"FAOA-TRAIN-002.00":"Feeder agents and anyone doing feeder paperwork, plus their managers, have the Feeder Ramp Operations course (CAF157) and recurrent test (CAF157P) within 36 months. Passing CAF157P also covers the CAF137P recurrent, so nobody takes both.",
"FAOA-TRAIN-003.00":"Anyone loading/offloading ATR72-600F or C-408 (or doing paperwork on the containerized versions) has the aircraft-specific course within 36 months. ATR containerized = CATRAC. C-408 containerized = C408AC (which also covers bulk). C-408 bulk = C408BL (which does NOT cover containerized).",
"FAOA-TRAIN-004.00":"Anyone who got CAF137/CAF157 before 12/1/2023 has since reviewed and acknowledged the Multi-Engine Chocking, Safety Marker, and Prop-Brake job aid (course code CMEFCSF).",
"FAOA-TRAIN-005.00":"If the location uses vendors for ground handling, it follows the Vendor Endorsement Procedures in ROM 2-20-5.",
"FAOA-TRAIN-006.00":"Anyone accepting, inspecting, handling, loading, or processing DG - plus their managers - is current on DG Specialist training (US: CAE101 initial, CDGSR recurrent) and Workbench DG (CWBDGT initial, CWBDGT3 recurrent).",
"FAOA-TRAIN-007.00":"This item hasn't been photographed yet - the page between the DG training item and the GPU/deice item is missing. Snap it and it can be filled in.",
"FAOA-TRAIN-008.00":"Anyone running a GPU, deicing, marshalling, wing walking, or operating GSE has the course for that task (CFGPU, CFDEICE, CMARSHF, CWNGWK, plus whatever GSE courses apply).",
"FAOA-TRAIN-009.00":"Aircraft Mishap Response (CMSHPRX) within 12 months for ramp managers and senior managers worldwide - senior managers only at AFW/LAX/OAK, nobody at ANC/CDG/EWR/IND/MEM/SFS, and ramp agents at small unstaffed locations.",
"FAOA-WS-001.00":"Only company-approved scales weigh cargo going on FedEx aircraft, and the location has a FAO-approved backup scale procedure.",
"FAOA-WS-002.00":"Primary and backup scales are calibrated or validated every six months - due by the end of the sixth month (calibrated Jan 14 means done by end of July). Vendor-calibrated portable feeder scales can keep the vendor's record instead of the M-8183; FedEx-calibrated ones need the M-8183.",
"FAOA-WS-003.00":"The current calibration record is on file at the station, and the previous one stays for at least 30 days after the new one is filed.",
"FAOA-WS-004.00":"Each scale has a current calibration sticker on its readout (two for dual-readout scales; adjacent to the display if there's no room on it). All expired stickers are peeled off - only the current date stays.",
"FAOA-WS-005.00":"Every scale gets checked once per 24 hours before any cargo is weighed, on a current M-1268. The EPN has to match across the form, the data plate, and the calibration record. Accuracy within 1%, verified with an adequate weight. Method by type: pancake - dolly off the tug; slide deck/WASP/push-off LD3 - empty container with doors; portable/feeder - 50 lbs known weight.",
"FAOA-WS-006.00":"Scales work, or an 8.5x11 sheet reading SCALE INOP DO NOT USE is taped over the readout of the broken one."
});

"CORP-ACK-001.01":"Sign off that you've read and will follow the Risk and Compliance Center integrity statement.",
"CORP-ACK-005.01":"Sign off that you reviewed the last 6 months of findings for this location and updated the section for corrective action effectiveness. Put your notes in Review Comments.",
"CORP-ACK-006.00":"Sign off that the Senior Manager and Ops Manager at this location had zero involvement in running or generating anything for this audit. If it turns out they did, the whole audit gets thrown out of Archer.",
"CORP-ACK-007.01":"Confirm the Sr. Manager told every Ops Manager: keep time cards per retention rules, get employee acknowledgement on any manager-initiated change, reconcile time records before payroll cutoff, watch the shortened holiday-week window, and treat any task card with pay codes like a hard copy time card.",
"AVP-DIVISION":"Pick the AVP division from the dropdown. (This packet shows AGFS.)",
"CORP-AVP-001.00":"Attach the completed AVP Variance workbook you used for the AVP.",
"CORP-AHD-001.03":"The AHEAD poster is up on a communication board, in the break room, or next to the posted schedules.",
"CORP-AHD-002.03":"There's a Super User assigned, and they're updating additional hours weekly.",
"CORP-AHD-003.00":"Schedules kept 12 months (longer if state law or a litigation hold says so).",
"CORP-AHD-004.03":"Did the location run a draft in the last 3 months? (Conditional - drives the next two questions.)",

"CORP-AHD-004.03b":"All draft lists are posted and kept for 12 months.",

"CORP-AHD-007.04":"Pull up to 10 random job templates and check that the required training is right for the position and covers both initial and recurrent.",
"CORP-AHD-008.06":"Check the Super User is using the pass-over codes correctly - the full list runs from Code 7 (would be a seventh day) through Code Z (adding a volunteer without updating status), covering declined, rejected, sick, untrained, unreachable, no-work, cancelled, and worked.",
"CORP-BID-001.00":"Facility is clean, orderly, litter-free - parking lot included.",
"CORP-BID-002.02":"FedEx branding on the building exterior and customer area is in good shape.",
"CORP-BID-005.01":"An approved ARC Hours of Operation sign is posted where customers see it, with accurate Sunday-Saturday times, no lunch/break closures, the last drop-off time listed, and no stale comments left on PF6.",
"CORP-BID-007.02":"Management has a monthly process for inventorying and inspecting POS devices and card readers.",
"CORP-BID-008.00":"Management knows where to find the Mission Statement, the ISO intranet homepage, the Quality Manual, and the Quality Policy.",
"CORP-BID-009.00":"If there's a revenue/counter scale: calibration forms filed (or a sticker on the scale) and kept a year.",
"CORP-BID-010.01":"Any offline manuals or forms kept around for reference are labeled 'For reference only'.",
"CORP-BID-011.01":"There's a real way employees get communications - a common bulletin board or an email distribution list.",
"CORP-BID-012.01":"Everyone's in uniform per their job classification.",
"CORP-BID-014.01":"All required contingency plans are current and on file in hard copy: Winter Ops, manpower shortages, GSE failure, power outage, inclement weather, late aircraft or disabled shuttles, sort system malfunction, and aircraft strikes where applicable.",
"CORP-DG-013.01":"Shipper's Declarations for packages received here are kept 12 months plus the current month - no longer (over-retention counts as No). Part C or CR can stand in. The file may also hold DG Customer Authorization forms and batch headers.",
"CORP-DG-016.00":"If there's a customer counter, the undeclared-DG penalty warning signage is posted.",
"CORP-DG-017.01":"DG files live in a well-known central spot that any manager can get to in an emergency.",
"AGFS-DG-006.00":"Check whether non-DG shipments are loaded behind, under, or beside ADG in the DG ULD. They must never sit on top of or in front of ADG.",
"DG-Q3-TRUCKS-TESTED":"Write the vehicle numbers you spot-checked into the comments. If you tested none, write N/A.",
"CORP-DG-004.04":"Inspect inbound and outbound ULDs, bulk shuttles, and P&D vehicles for: proper blocking and bracing, correct segregation, arrows up on every DG package, the automated DG tag filled out and visible in its envelope, and the tag pulled off immediately once the DG is out.",
"CORP-DG-018.01":"If hazard class and quantity call for it, the driver placards the vehicle - and that driver is CDL HAZ endorsed and in the CDL job classification. Job aid part #136328 covers when and how. Note the observed drivers' employee numbers in comments.",
"CORP-DG-047.00":"Sort DG manifests marked properly and kept in the 30-day rolling flight file.",
"CORP-DG-021.01":"The spill cabinet has a current, complete Monthly Spill Cleanup Compliance Checklist on it or in it.",
"CORP-DG-040.01":"At least one full supplemental set of DG placards - four per required class - available for every vehicle that routinely carries DG. A full set means Dangerous When Wet, Radioactive, and Dangerous.",
"CORP-DG-025.04":"Current-year IATA manual on hand in hard copy, with any applicable addendum printed and tucked in with each copy.",
"DG-ATTACHMENT":"Download the DG workbook from the CSM document site, do the testing, and upload the completed file. You can't submit the CSM without it. Each tab scores separately and feeds the questions below.",
"CORP-DG-035.00":"DG Supplies tab scored 95% or better.",
"CORP-DG-036.00":"PM DG Procedures tab scored 95% or better.",
"CORP-DG-037.00":"DG File_Imaging Procedures tab scored 95% or better.",
"CORP-DG-038.00":"Bump Procedures tab scored 95% or better.",
"CORP-DG-041.00":"DG Specialist Knowledge tab scored 95%.",
"DG-STAFFING-ACK":"Acknowledge the staffing rules: a trained DG Specialist on duty for any aircraft activity (if a manager covers, that gets noted in the schedule file), and a trained Spill Cleanup Specialist on duty during sort or reload - or reachable and en route within 30 minutes at other times. US ops stations and ramps outside Hub Ops don't need a DG specialist for the whole sort; staff DG inspection per table 1-2-1.",
"CORP-DG-030.05a":"AM shift staffing meets the guidelines. Verify three ways: check last week's time cards Monday-Sunday for the right in-facility work code, review the published schedule, and eyeball the AM sort for adequate staffing. The CSM wants an employee number per day - enter those over there, not here.",
"CORP-DG-030.05b":"Same check for the PM shift: time cards, published schedule, and a visual look at the PM sort. Employee numbers per day go in the CSM itself.",
"CORP-DG-046.00":"At least two Spill Cleanup Specialists (or Spill Cleanup Only Specialists) work at this location.",
"CORP-ENV-001.04":"There's a location environmental coordinator named in GEMIS, and that person is actually the current LEC. New ones get appointed within 30 days of a location opening or the old LEC leaving.",
"CORP-ENV-003.04":"Environmental files are in a central, secure, stickered location, kept 3 years plus the current year. Some things stay forever: emergency generator logs, permits and registrations, and the contingency/SPCC/SWPPP plans.",
"CORP-ENV-004.04":"Waste manifests and their matched return copies are in the environmental files for 3 years plus the current year. Designated Facility to Generator copies should come back and get matched within 45 days of pickup. Doesn't apply to waste on a Bill of Lading.",
"CORP-ENV-004b.02":"Both the Generator's Initial Copy and the Designated Facility to Generator copy of every hazardous waste manifest have been matched up and filed since the last CSM audit.",
"CORP-ENV-004A.01":"Every special, nonhazardous, and hazardous waste area has a completed Weekly Waste Accumulation Area Inspection log (or the combined AST version) for the last 12 months. California requires daily. Multiple areas can share a log as long as each is identified.",
"CORP-ENV-006.03":"Did the location have any DG or non-DG waste package incidents needing vendor disposal in the last 12 months? (Conditional - if yes, answer the next two.)",
"CORP-ENV-006B.02":"Every DG waste container left the facility within 90 days of its accumulation start date.",
"CORP-ENV-006C.01":"The weekly waste accumulation inspection log was filled out every single week from the accumulation start date until disposal.",
"CORP-ENV-009.04":"Battery recycling done right: accumulation start date on the container and under 365 days old, lid closed except when adding, contact points taped, shipping log on or near the bucket and filled out, approved waste vendor used, quarterly inspections done, and Universal Waste signage posted.",
"CORP-ENV-011.04":"Fluorescent bulb recycling done right: box stored so bulbs can't break, lid closed, start date on the label and under 365 days old, area labeled Universal Waste, approved vendor, quarterly inspections, signage posted. Applies to janitorial staff and any outside bulb-replacement vendor too.",
"CORP-ENV-012.02":"Does the facility have a Storm Water Pollution Prevention Plan? Usually required if there are outdoor industrial activities. (Conditional.)",
"CORP-ENV-012B.02":"The Pollution Prevention Team reviewed the SWPPP within the last 12 months, and the documentation is in the SWPPP.",
"CORP-ENV-012C.03":"Storm water inspections happened on the schedule the SWPPP lays out - which can include annual site inspections, monthly visuals, quarterly inspections, quarterly wet/dry, and quarterly visual observations.",
"CORP-ENV-013.03":"Storm water inspections done semi-annually in the last 12 months per the Environmental P&P.",
"CORP-ENV-014.02":"Is vehicle or equipment washing done on-site? (Conditional.)",
"CORP-ENV-014A.04":"Equipment washing (aircraft, GSE, vans, trucks, trailers) was observed and documented every quarter for the last 12 months. If washing happens outside, the water gets collected and sent to a floor drain or hauled off - only a few sites have permits to discharge on-site.",
"CORP-ENV-014C.03":"Upload the Quarterly Wash Observation documentation. If you don't wash on-site, attach a file saying so."

"CORP-ENV-015A.03":"Every AST got its monthly inspection. An AST is any stationary vessel 55 gallons or more; any container over 55 gal holding new or used fuel counts too. The combined weekly waste/AST log satisfies this.",
"CORP-ENV-015B.01":"At SPCC locations, petroleum ASTs got inspected on the form in the SPCC plan, at least monthly. SPCC plans kick in at 1,320 gallons total storage.",

"CORP-ENV-016C.02":"Monthly UST walkthrough inspections done and documented on the right form for the last 12 months. OAKR, LAXR, and JEMA are exempt - vendors do theirs.",

"CORP-Time-005.02":"Timecards reviewed daily, and Must Fix exceptions cleared weekly before the pay period closes.",

"AGFS-OPST-003.02":"A 30-calendar-day file of AM and PM PST checks is kept, covering all warehouse PST checklists, all ramp staging area checklists, and all ramp control sheets.",

"CORP-PAH-001.00":"There's an Open Package Log Book, and it's clearly been used - recently and in the past.",

"CORP-PAH-004.01":"Rewrap materials are on hand to fix package problems as they happen, and the rewrap area is as close to the sort belt as possible with proper signage.",
"CORP-PAH-006.02":"Damaged packages get inspected immediately and a STAT 37 applied. Anything leaking or smelling goes straight to the DG Specialist.",
"CORP-PAH-007.01":"PM check: luggage and non-conveyables have tie-on tags - canvas bags, garment bags, sporting equipment, plastic coolers, wooden cases.",

"CORP-PAH-020.02":"During PM reload, watch the outbound belt for at least 20 minutes and six-side-check packages: old labels and markings gone or fully covered, current markings indelible and durably affixed, labels secure, pouch documentation not falling out, packaging intact (not torn, wet, badly dented, leaking, or smelly), and an acceptable packaging type - no chipboard boxes, no cellophane/duct/masking tape, no string or rope. Scan what you observed to a Paperwork Pouch CONS (form ID 0505).",

"CORP-SAF-015.01":"Nobody's using unauthorized electronic devices while driving FedEx vehicles.",
"CORP-SAF-021.00":"Work areas get inspected for damaged extension cords.",

"CORP-AED-002.02":"AED inspection results are updated in LifeReady360 for the last 3 months.",
"CORP-AED-004.01":"AED pads and batteries are compliant. Check the AED dashboard.",

"CORP-ERM-002.01":"The SF-730 ergonomic assessment is on file for the quarter. Just checking it exists here. If several were done, pick one and say which in the comments - and you can't test the same work shift quarter after quarter. Locations under 10 employees are exempt unless they're in California or New York.",
"CORP-ERM-003.01":"The SF-730 header is filled out right on the correct revision: at least two of three station fields, the start date, end date, fiscal quarter, and work shift name, an appropriate work area, and the EC plus team member names. Quarter alone is fine (Q3, not FY24Q3). Under 10 employees, the EC doesn't need a team - unless CA or NY.",

function fmtDate(ts){
  const d = new Date(ts);
  return (d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();
}
function fmtDateTime(ts){
  const d = new Date(ts);
  let h = d.getHours(), m = String(d.getMinutes()).padStart(2,"0");
  const ap = h>=12?"p":"a"; h = h%12||12;
  return fmtDate(ts)+" "+h+":"+m+ap;
}

function secStats(sec){
  let answered=0, nc=0, na=0, actual=0, possible=0;
  sec.items.forEach(it=>{
    const a = state.answers[it.id];
    if(a && a.status){
      answered++;
      if(a.status==="c") actual += it.w;
      if(a.status==="nc") nc++;
      if(a.status==="na") na++;
    }
    if(!(a && a.status==="na")) possible += it.w;
  });
  return {answered, nc, na, actual, possible, total:sec.items.length};
}
function sumStats(secs){
  const s = {answered:0,nc:0,na:0,actual:0,possible:0,total:0};
  secs.forEach(sec=>{ const st = secStats(sec); for(const k in s) s[k]+=st[k]; });
  return s;
}
const auditStats = a => sumStats(a.secs.map(secById));

function pct(a,p){ return p===0 ? 100 : Math.round(a/p*1000)/10; }

function checkSectionDone(sec){
  const st = secStats(sec);
  if(st.answered===st.total){
    if(!state.sectionDone[sec.id]) state.sectionDone[sec.id] = Date.now();
  } else {
    delete state.sectionDone[sec.id];
  }
}

function setAnswer(itemId, status){
  const prev = state.answers[itemId] || {};
  if(prev.status===status){
    delete state.answers[itemId];
  } else {
    state.answers[itemId] = {status, comment: prev.comment||"", ts: Date.now()};
  }
  SECTIONS.forEach(checkSectionDone);
  save(); render();
}

  if(btn){
    btn.className = "cmtbtn"+(val.trim()?" has":"");
    btn.innerHTML = "&#9998; "+(val.trim()?"NOTE ADDED":"ADD NOTE");
  }
}

function toast(msg){

}

function render(){
  const app = document.getElementById("app");
  const back = document.getElementById("backBtn");
  const o = overallStats();
  document.getElementById("topPct").textContent = o.answered? pct(o.actual,o.possible)+"%" : "--%";
  const sub = document.getElementById("brandSub");
  if(view.name==="home"){
    back.classList.remove("show");
    sub.innerHTML = '3 audits &middot; '+TOTAL_ITEMS+' items';
    app.innerHTML = homeHTML(o);
  } else if(view.name==="audit"){
    back.classList.add("show");

    back.classList.add("show");

    sub.innerHTML = z.desc;
    app.innerHTML = zoneHTML(z);

    back.classList.add("show");
    const a = auditById(view.audit);
    sub.innerHTML = a.title;
    app.innerHTML = sectionHTML(secById(view.sec));
    bindSection();
  }
}

    + '<div class="filters" style="justify-content:center">'
    + '<button class="chip '+(homeMode==="audit"?'on':'')+'" onclick="setMode(\'audit\')">By Audit</button>'
    + '<button class="chip '+(homeMode==="zone"?'on':'')+'" onclick="setMode(\'zone\')">By Location</button>'
    + '</div><div class="cards">';
  if(homeMode==="zone"){
    ZONES.forEach(z=>{
      const st = zoneStats(z.id);
      const done = st.answered===st.total;
      const allC = done && st.nc===0;
      h += '<div class="card audit '+(done?'done':'')+'" onclick="openZone(\''+z.id+'\')">'
        + '<div class="row1"><span class="code">'+z.code+'</span></div>'
        + '<h2>'+z.title+'</h2>'
        + '<div class="desc">'+z.desc+'</div>'
        + runway(st.total? st.answered/st.total:0, allC)
        + '<div class="meta"><span>'+st.answered+'/'+st.total+' answered'
        + (st.nc?' &middot; <span class="flag">'+st.nc+' non-compliant</span>':'')
        + '</span><span>'+(st.answered? pct(st.actual,st.possible)+'%':'')+'</span></div></div>';
    });
    h += '</div>';
    return h;
  }
  AUDITS.forEach(a=>{
    const st = auditStats(a);
    const done = st.answered===st.total;
    const allC = done && st.nc===0;
    h += '<div class="card audit '+(done?'done':'')+'" onclick="openAudit(\''+a.id+'\')">'
      + '<div class="row1"><span class="code">'+a.code+'</span></div>'
      + '<h2>'+a.title+'</h2>'
      + '<div class="desc">'+a.desc+'</div>'
      + runway(st.answered/st.total, allC)
      + '<div class="meta"><span>'+a.secs.length+' sections &middot; '+st.answered+'/'+st.total+' answered'
      + (st.nc?' &middot; <span class="flag">'+st.nc+' non-compliant</span>':'')
      + '</span><span>'+(st.answered? pct(st.actual,st.possible)+'%':'')+'</span></div></div>';
  });
  h += '</div>';
  return h;
}

function auditHTML(a){
  const st = auditStats(a);
  let h = '<div class="sechead">'
    + '<span class="code">'+a.code+' &middot; '+st.answered+'/'+st.total+' &middot; '+(st.answered?pct(st.actual,st.possible)+'%':'&mdash;')+'</span>'
    + '<h1>'+a.title+'</h1>'
    + runway(st.answered/st.total, st.answered===st.total && st.nc===0)
    + '</div><div class="cards">';
  a.secs.map(secById).forEach(sec=>{
    const ss = secStats(sec);
    const done = state.sectionDone[sec.id];
    const allC = done && ss.nc===0;
    h += '<div class="card '+(done?'done':'')+'" onclick="openSection(\''+sec.id+'\')">'
      + '<div class="row1"><span class="code">'+sec.code+'</span></div>'
      + '<h2>'+sec.title+'</h2>'
      + runway(ss.answered/ss.total, allC)
      + '<div class="meta"><span>'+ss.answered+'/'+ss.total+' answered'
      + (ss.nc?' &middot; <span class="flag">'+ss.nc+' non-compliant</span>':'')
      + '</span><span>'+(done?'<span class="stamp">'+(allC?'ALL COMPLIANT ':'COMPLETED ')+fmtDate(done)+'</span>':'')+'</span></div></div>';
  });
  h += '</div>';
  return h;
}

function sectionHTML(sec){
  const st = secStats(sec);
  const filters = [
    {id:"all", label:"All", ct:st.total},
    {id:"open", label:"Open", ct:st.total-st.answered},
    {id:"nc", label:"Non-compliant", ct:st.nc}
  ];
  let h = '<div class="sechead">'
    + '<span class="code">'+sec.code+' &middot; '+st.answered+'/'+st.total+' &middot; '+(st.answered?pct(st.actual,st.possible)+'%':'&mdash;')+'</span>'
    + '<h1>'+sec.title+'</h1>'
    + runway(st.answered/st.total, st.answered===st.total && st.nc===0)
    + '</div><div class="filters">';
  filters.forEach(f=>{
    h += '<button class="chip '+(view.filter===f.id?'on':'')+'" onclick="setFilter(\''+f.id+'\')">'+f.label+'<span class="ct">'+f.ct+'</span></button>';
  });
  h += '</div>';
  sec.items.forEach(it=>{ h += itemCardHTML(it); });
  return h;
}

function zoneHTML(z){
  const items = zoneItems(z.id);
  const st = sumStats([{id:"z",items:items}]);
  const filters = [
    {id:"all", label:"All", ct:st.total},
    {id:"open", label:"Open", ct:st.total-st.answered},
    {id:"nc", label:"Non-compliant", ct:st.nc}
  ];
  let h = '<div class="sechead">'
    + '<span class="code">'+z.code+' &middot; '+st.answered+'/'+st.total+' &middot; '+(st.answered?pct(st.actual,st.possible)+'%':'&mdash;')+'</span>'
    + '<h1>'+z.title+'</h1>'
    + runway(st.total? st.answered/st.total:0, st.answered===st.total && st.nc===0)
    + '</div><div class="filters">';
  filters.forEach(f=>{
    h += '<button class="chip '+(view.filter===f.id?'on':'')+'" onclick="setFilter(\''+f.id+'\')">'+f.label+'<span class="ct">'+f.ct+'</span></button>';
  });
  h += '</div>';
  let lastSec = null;
  SECTIONS.forEach(sec=>{
    sec.items.forEach(it=>{
      if(zoneOf(it,sec.id)!==z.id) return;
      const a = state.answers[it.id];
      const status = a?a.status:null;
      if(view.filter==="open" && status) return;
      if(view.filter==="nc" && status!=="nc") return;
      if(sec.id!==lastSec){
        const aud = auditOf(sec.id);
        h += '<div style="font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);margin:14px 2px 6px">'
          + aud.title.toUpperCase()+' &middot; '+sec.code+' &mdash; '+sec.title.toUpperCase()+'</div>';
        lastSec = sec.id;
      }
      h += itemCardHTML(it);
    });
  });
  return h;
}

function itemCardHTML(it){
    const a = state.answers[it.id];
    const status = a?a.status:null;
    if(view.filter==="open" && status) return "";
    if(view.filter==="nc" && status!=="nc") return "";
    const usePlain = plainMode && PLAIN[it.id];
    const shownText = usePlain ? PLAIN[it.id] : it.text;
    const long = shownText.length>320;
    const pendingNote = it.text.indexOf("[ITEM PENDING")>=0 || it.text.indexOf("[TEXT PENDING")>=0;
    return '<div class="item" id="card-'+it.id+'">'
      + '<div class="head"><span class="id">'+it.id+'</span>'
      + '<span class="wt'+(it.wq?' unk':'')+'">WT '+(it.wq?'?':it.w)+'</span>'
      + (usePlain?'<span class="pending">PLAIN</span>':'')
      + (pendingNote?'<span class="pending">PARTIAL TEXT</span>':'')
      + '<span class="when">'+(a&&a.ts?fmtDateTime(a.ts):'')+'</span></div>'
      + '<div class="txt '+(long?'clamp':'')+'" id="txt-'+it.id+'">'+esc(shownText)+'</div>'
      + (long?'<button class="morebtn" onclick="expand(\''+it.id+'\',this)">SHOW FULL TEXT</button>':'')
      + '<div class="answers">'
      + '<button class="abtn c '+(status==='c'?'on':'')+'" onclick="setAnswer(\''+it.id+'\',\'c\')">Compliant</button>'
      + '<button class="abtn n '+(status==='nc'?'on':'')+'" onclick="setAnswer(\''+it.id+'\',\'nc\')">Non-Compl</button>'
      + '<button class="abtn x '+(status==='na'?'on':'')+'" onclick="setAnswer(\''+it.id+'\',\'na\')">N/A</button>'
      + '</div>'
      + (status==='nc'?'<div class="nc-hint">Flagged for retry - consider adding a note on the finding.</div>':'')
      + '<button class="cmtbtn '+(a&&a.comment?'has':'')+'" data-cbtn="'+it.id+'" onclick="toggleCmt(\''+it.id+'\')">&#9998; '+(a&&a.comment?'NOTE ADDED':'ADD NOTE')+'</button>'
      + '<textarea class="cmt" id="cmt-'+it.id+'" placeholder="Optional note / finding detail...">'+(a&&a.comment?esc(a.comment):'')+'</textarea>'
      + '</div>';
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function bindSection(){
  document.querySelectorAll("textarea.cmt").forEach(t=>{
    t.addEventListener("input", e=>{
      setComment(e.target.id.replace("cmt-",""), e.target.value);
    });
  });
}
function toggleCmt(id){
  const t = document.getElementById("cmt-"+id);
  t.classList.toggle("show");
  if(t.classList.contains("show")) t.focus();
}
function expand(id, btn){
  document.getElementById("txt-"+id).classList.remove("clamp");
  btn.remove();
}
function auditOf(secId){ return AUDITS.find(a=>a.secs.indexOf(secId)>=0); }
function openAudit(id){ view={name:"audit",audit:id,sec:null,filter:"all"}; window.scrollTo(0,0); render(); }
function openSection(id){ view={name:"sec",audit:auditOf(id).id,sec:id,filter:"all"}; window.scrollTo(0,0); render(); }
function openZone(id){ view={name:"zone",audit:null,sec:null,zone:id,filter:"all"}; window.scrollTo(0,0); render(); }
function setFilter(f){ view.filter=f; render(); }
document.getElementById("backBtn").onclick = ()=>{
  if(view.name==="sec") view={name:"audit",audit:view.audit,sec:null,zone:null,filter:"all"};
  else view={name:"home",audit:null,sec:null,zone:null,filter:"all"};
  window.scrollTo(0,0); render();
};

/* plain-language toggle */
function syncPlainBtn(){
  const b = document.getElementById("plainBtn");
  b.textContent = plainMode ? "Official text" : "Plain English";
  b.style.borderColor = plainMode ? "var(--amber)" : "var(--line)";
  b.style.color = plainMode ? "var(--amber)" : "var(--text)";
}
document.getElementById("plainBtn").onclick = ()=>{
  plainMode = !plainMode;
  try{ localStorage.setItem(PLAINKEY, plainMode?"1":"0"); }catch(e){}
  syncPlainBtn();
  render();
  toast(plainMode ? "Plain English on - official wording governs" : "Showing official policy text");
};

/* jump to the first unanswered item anywhere */
document.getElementById("openBtn").onclick = ()=>{
  for(const a of AUDITS){
    for(const sec of a.secs.map(secById)){
      for(const it of sec.items){
        const ans = state.answers[it.id];
        if(!(ans&&ans.status)){
          view={name:"sec",audit:a.id,sec:sec.id,filter:"open"};
          render();
          setTimeout(()=>{
            const el = document.getElementById("card-"+it.id);
            if(el && el.scrollIntoView) el.scrollIntoView({behavior:"smooth",block:"center"});
          },80);
          return;
        }
      }
    }
  }
  toast("All "+TOTAL_ITEMS+" items answered");
};

/* minimize the bottom bar */
const FABKEY = "fxeAodFab_v1";
const fabEl = document.getElementById("fab");
const fabToggle = document.getElementById("fabToggle");
function syncFab(minned){
  fabEl.classList.toggle("min", minned);
  fabToggle.innerHTML = minned ? "&#9650;" : "&#9660;";
  fabToggle.setAttribute("aria-label", minned ? "Show menu" : "Hide menu");
}
let fabMin = false;
try{ fabMin = localStorage.getItem(FABKEY)==="1"; }catch(e){}
syncFab(fabMin);
fabToggle.onclick = ()=>{
  fabMin = !fabMin;
  try{ localStorage.setItem(FABKEY, fabMin?"1":"0"); }catch(e){}
  syncFab(fabMin);
};

/* two-tap reset */
let resetArmed = false, resetTimer = null;
const resetBtn = document.getElementById("resetBtn");
resetBtn.onclick = ()=>{
  if(!resetArmed){
    resetArmed = true;
    resetBtn.classList.add("arm");
    resetBtn.textContent = "Erase all?";
    toast("Tap again to erase every answer");
    resetTimer = setTimeout(disarmReset, 4000);
    return;
  }
  clearTimeout(resetTimer);
  disarmReset();
  try{ localStorage.removeItem(KEY); }catch(e){}
  state = {answers:{}, sectionDone:{}};
  view = {name:"home", audit:null, sec:null, filter:"all"};
  window.scrollTo(0,0);
  render();
  toast("All progress erased");
};
function disarmReset(){
  resetArmed = false;
  resetBtn.classList.remove("arm");
  resetBtn.textContent = "Reset";
}

/* plain-text export for transcribing into CSM */
document.getElementById("exportBtn").onclick = ()=>{
  const o = overallStats();
  let out = "FXE STATION AUDITS SUMMARY - exported "+fmtDateTime(Date.now())+"\n";
  out += "Overall: "+(o.answered?pct(o.actual,o.possible)+"%":"-")+" ("+o.actual+"/"+o.possible+" pts) | "+o.answered+"/"+o.total+" answered | "+o.nc+" non-compliant\n";
  AUDITS.forEach(a=>{
    const ast = auditStats(a);
    out += "\n########## "+a.title+" ("+ast.answered+"/"+ast.total+", "+(ast.answered?pct(ast.actual,ast.possible)+"%":"-")+") ##########\n";
    a.secs.map(secById).forEach(sec=>{
      const st = secStats(sec);
      out += "\n=== "+sec.code+" - "+sec.title+" ("+st.answered+"/"+st.total;
      if(state.sectionDone[sec.id]) out += ", completed "+fmtDate(state.sectionDone[sec.id]);
      out += ") ===\n";
      sec.items.forEach(it=>{
        const ans = state.answers[it.id];
        const s = ans&&ans.status ? {c:"COMPLIANT",nc:"NON-COMPLIANT",na:"N/A"}[ans.status] : "-";
        out += it.id+": "+s+(ans&&ans.ts?" ("+fmtDate(ans.ts)+")":"");
        if(ans&&ans.comment&&ans.comment.trim()) out += " - "+ans.comment.trim();
        out += "\n";
      });
    });
  });
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(out).then(()=>toast("Summary copied to clipboard"))
      .catch(()=>{ fallbackCopy(out); });
  } else fallbackCopy(out);
};
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text; document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); toast("Summary copied to clipboard"); }
  catch(e){ toast("Copy failed on this browser"); }
  document.body.removeChild(ta);
}

document.getElementById("itemCount").textContent = TOTAL_ITEMS;
syncPlainBtn();
render();
</script>
</body>
</html>
